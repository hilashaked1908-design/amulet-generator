<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>מחיקת קמע</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #0f0f0f;
      color: #eee;
      font-family: system-ui, sans-serif;
      padding: 24px;
    }
    .card {
      max-width: 560px;
      margin: 0 auto;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 24px;
    }
    h1 { margin: 0 0 8px; font-size: 1.2rem; font-weight: 500; }
    p { color: #aaa; line-height: 1.6; margin: 0 0 12px; }
    button {
      border: none;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 1rem;
      cursor: pointer;
      background: #c44;
      color: #fff;
      width: 100%;
      margin-top: 8px;
    }
    button:disabled { opacity: 0.45; cursor: wait; }
    #log {
      margin-top: 16px;
      font-size: 0.92rem;
      line-height: 1.7;
      white-space: pre-wrap;
      font-family: ui-monospace, monospace;
    }
    .ok { color: #9cf; }
    .err { color: #f88; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">מחיקת קמע</h1>
    <p id="desc">מוחק מהאוסף, מהגן, מהפילטרים ומ-IndexedDB.</p>
    <button type="button" id="runBtn">מחק</button>
    <div id="log"></div>
  </div>

  <script type="module">
    import { deleteGlb } from './amulet-glb-store.js';

    const params = new URLSearchParams(location.search);
    const labelParam = params.get('label') || '033';
    const autoRun = params.get('auto') !== '0';
    const QUESTIONS = 8;
    const COLLECTION_KEY = 'amuletCollection';
    const INDEX_URL = '/questionnaire/index.html';

    const labelNum = parseInt(labelParam, 10);
    const label = String(labelNum).padStart(3, '0');

    document.getElementById('title').textContent = 'מחיקת קמע [' + label + ']';

    function log(html) {
      document.getElementById('log').innerHTML += html + '\n';
    }

    function loadCollection() {
      try {
        const raw = localStorage.getItem(COLLECTION_KEY) || sessionStorage.getItem(COLLECTION_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch (_) {
        return [];
      }
    }

    function saveCollection(collection) {
      const json = JSON.stringify(collection);
      try { localStorage.setItem(COLLECTION_KEY, json); } catch (_) {}
      try { sessionStorage.setItem(COLLECTION_KEY, json); } catch (_) {}
    }

    function collectionDisplayLabel(collectionIndex) {
      return QUESTIONS + collectionIndex + 1;
    }

    function findEntryByLabel(targetLabel) {
      const collection = loadCollection();
      for (let i = 0; i < collection.length; i += 1) {
        if (collectionDisplayLabel(i) === targetLabel) {
          return { entry: collection[i], collectionIndex: i };
        }
      }
      return null;
    }

    async function deleteIdbForEntry(entryId) {
      const snapKey = 'collection-' + entryId;
      const keys = [
        snapKey,
        'snap-' + snapKey,
        'snap-composed3d-' + entryId,
        'snap-answers-collection-' + entryId,
      ];
      await Promise.all(keys.map(function (key) {
        return deleteGlb(key).catch(function () {});
      }));
    }

    function redirectToGardenRemoval() {
      log('<span class="ok">מעביר לגן להסרה חיה…</span>');
      window.setTimeout(function () {
        location.href = INDEX_URL + '?removeLabel=' + encodeURIComponent(String(labelNum));
      }, 400);
    }

    async function deleteOne() {
      const btn = document.getElementById('runBtn');
      btn.disabled = true;
      document.getElementById('log').textContent = '';

      if (!Number.isFinite(labelNum) || labelNum <= QUESTIONS) {
        log('<span class="err">label לא תקין: ' + labelParam + '</span>');
        btn.disabled = false;
        return;
      }

      if (typeof window.gardenRemoveCollectionByLabel === 'function') {
        log('מוחק [' + label + '] מהגן…');
        await window.gardenRemoveCollectionByLabel(labelNum);
        log('<span class="ok">הוסר מהגן, האוסף והפילטרים.</span>');
        btn.textContent = 'נמחק';
        return;
      }

      const found = findEntryByLabel(labelNum);
      const entry = found && found.entry;
      const entryId = entry && entry.id;
      const wish = entry && entry.answers && entry.answers.q1Wish
        ? String(entry.answers.q1Wish).trim()
        : '';

      if (entry) {
        log('מוחק [' + label + ']' + (entryId ? ' · id=' + entryId : ''));
        if (wish) log(wish);
        if (entryId != null) {
          log('מנקה IndexedDB…');
          await deleteIdbForEntry(entryId);
        }
        const collection = loadCollection();
        const kept = collection.filter(function (_, i) { return i !== found.collectionIndex; });
        saveCollection(kept);
        log('<span class="ok">הוסר מהאוסף (' + collection.length + ' → ' + kept.length + ')</span>');
      } else {
        log('לא נמצא באוסף — מנקה sprite יתום בגן אם קיים…');
      }

      redirectToGardenRemoval();
    }

    document.getElementById('runBtn').addEventListener('click', function () {
      deleteOne().catch(function (err) {
        log('<span class="err">' + (err && err.message ? err.message : err) + '</span>');
        document.getElementById('runBtn').disabled = false;
      });
    });

    if (autoRun) {
      deleteOne().catch(function (err) {
        log('<span class="err">' + (err && err.message ? err.message : err) + '</span>');
        document.getElementById('runBtn').disabled = false;
      });
    }
  </script>
</body>
</html>
