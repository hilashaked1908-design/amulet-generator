                      </span>

                        </span>
                      </span>
                    </span>

                </div>
              </div>

              <div class="figma-q__head">
                <span class="figma-q__tag" id="questionTag">[בקשה]</span>
                <p class="figma-q__title" id="questionText"></p>
              </div>
              <p class="figma-q__desc" id="questionDesc" hidden></p>
              <div class="figma-q__actions">
                <div class="figma-q__field-box">
                  <div class="figma-q__field" id="questionField"></div>

      <!-- Result overlay — Figma 2436:9214 (questionnaire result) -->
      <div class="pagmar__result-overlay" id="resultOverlay" hidden>
        <div class="pagmar__result-fog" id="resultFogHost" aria-hidden="true"></div>

        <div class="pagmar-canvas pagmar-canvas--result">

          <button type="button" class="pagmar__result-close" id="resultCloseBtn" aria-label="סגור">
            <img src="assets/detail/close-icon.svg" width="16.119" height="21.235" alt="">

          <main class="pagmar__result-main">

            <aside class="pagmar__result-sidebar" aria-label="מפרט קמע">
              <div class="pagmar__result-spec-row pagmar__result-spec-row--belonging">

                  <div class="pagmar__result-field">
                    <span class="pagmar__result-tag">[שייכות]</span>
                    <p class="pagmar__result-field-text" id="resultName">—</p>
                  </div>

                <div class="pagmar__result-vector pagmar__result-vector--belonging" id="resultVectorBelonging" aria-hidden="true"></div>

              </div>

              <section class="pagmar__result-components pagmar__result-section--ruled" aria-labelledby="resultComponentsLabel">

                  <span class="pagmar__result-tag" id="resultComponentsLabel">[מרכיבים]</span>
                  <ul class="pagmar__result-components-list" id="resultComponents"></ul>
                </div>
              </section>

              <section class="pagmar__result-tags pagmar__result-section--ruled" aria-labelledby="resultTagsLabel">
                <span class="pagmar__result-tag" id="resultTagsLabel">[תגיות]</span>
                <ul class="pagmar__result-tags-list" id="resultTags"></ul>
              </section>
            </aside>

            <span class="pagmar__result-num pagmar__glass-pill" id="resultNum">
              <span class="pagmar__glass-pill__text">[001]</span>
            </span>
