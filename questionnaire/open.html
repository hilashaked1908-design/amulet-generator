<body class="pagmar-open">
  <svg aria-hidden="true" focusable="false" style="position:absolute;width:0;height:0;overflow:hidden">
    <defs>
      <filter
        id="glass-distortion"
        x="-20%"
        y="-20%"
        width="140%"
        height="140%"
        color-interpolation-filters="sRGB"
      >
        <feTurbulence
          type="fractalNoise"
          baseFrequency="0.008 0.008"
          numOctaves="2"
          seed="5"
          result="noise"
        />
        <feGaussianBlur in="noise" stdDeviation="2" result="blurredNoise" />
        <feDisplacementMap
          in="SourceGraphic"
          in2="blurredNoise"
          scale="55"
          xChannelSelector="R"
          yChannelSelector="G"
        />
      </filter>
    </defs>
  </svg>

  <div class="pagmar__garden" id="openGlassGarden" aria-hidden="true"></div>

  <div class="pagmar-open__fog pagmar__detail-fog" id="openFogHost" aria-hidden="true"></div>

  <div class="pagmar-open__viewport">
    <main class="pagmar-open__stage" aria-label="פתיחה">
      <header class="pagmar-open__hero" aria-label="אות אמת">
        <p class="pagmar-open__hero-word pagmar-open__hero-word--left" dir="rtl">אמת</p>
        <span class="pagmar-open__hero-spacer" aria-hidden="true"></span>
        <p class="pagmar-open__hero-word pagmar-open__hero-word--right" dir="rtl">אות</p>
      </header>

      <div class="pagmar-open__amulet" aria-hidden="true">
        <div class="pagmar-open__amulet-3d" id="openAmulet3D"></div>
      </div>

      <p class="pagmar-open__enter-hint" dir="rtl">לחץ לכניסה לאתר</p>
    </main>
  </div>

  <script src="glass-lens.js?v=20250710-about-amulet-glass"></script>
