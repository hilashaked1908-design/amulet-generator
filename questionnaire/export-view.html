<!DOCTYPE html>
<html lang="he" dir="rtl" data-pagmar-build="20250710-export-view">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>קמע - ייצוא</title>
  <script src="pagmar-boot.js?v=20250710-export-view"></script>
  <link rel="stylesheet" href="../css/fonts.css?v=20250710-export-view">
  <link rel="stylesheet" href="../css/glass-lens.css?v=20250710-export-view">
  <link rel="stylesheet" href="../css/buttons.css?v=20250712-about-unified">
  <link rel="stylesheet" href="../css/pagmar-chrome.css?v=20250712-about-unified">
  <link rel="stylesheet" href="../css/export-view.css?v=20250712-export-loader-fog">
</head>
<body class="pagmar-export-view is-export-loading">

  <div
    class="pagmar__export-page-loader"
    id="exportPageLoader"
    hidden
    role="status"
    aria-live="polite"
    aria-busy="false"
  >
    <div class="pagmar__export-page-loader__vessels" aria-hidden="true">
      <img class="pagmar__export-page-loader__vessel pagmar__export-page-loader__vessel--1" src="assets/detail/loader-vessel-1.svg" alt="" decoding="sync" draggable="false" fetchpriority="high">
      <img class="pagmar__export-page-loader__vessel pagmar__export-page-loader__vessel--2" src="assets/detail/loader-vessel-2.svg" alt="" decoding="sync" draggable="false" fetchpriority="high">
      <img class="pagmar__export-page-loader__vessel pagmar__export-page-loader__vessel--3" src="assets/detail/loader-vessel-3.svg" alt="" decoding="sync" draggable="false" fetchpriority="high">
      <img class="pagmar__export-page-loader__vessel pagmar__export-page-loader__vessel--4" src="assets/detail/loader-vessel-4.svg" alt="" decoding="sync" draggable="false" fetchpriority="high">
    </div>
    <span class="pagmar__export-page-loader__sr">טוען</span>
  </div>

  <svg aria-hidden="true" focusable="false" style="position:absolute;width:0;height:0;overflow:hidden">
    <defs>
      <filter
        id="glass-distortion"
        x="-20%"
        y="-20%"
        width="140%"
        height="140%"
        color-interpolation-filters="sRGB"
      >
        <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="8" result="noise" />
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="14" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
  </svg>

  <div class="pagmar__export-fog" id="exportFogHost" aria-hidden="true"></div>

  <div class="pagmar__export-page">
    <header class="pagmar__export-chrome">
      <button type="button" class="pagmar__index-about pagmar-chrome__about" id="exportAboutBtn" aria-label="אודות">
        <span class="pagmar__index-about__label pagmar__index-type-target" data-type-text="אודות">אודות</span>
      </button>
      <button type="button" class="pagmar-chrome__close" id="exportCloseBtn" aria-label="סגור">
        <img src="assets/detail/close-icon.svg" width="16.119" height="21.235" alt="">
      </button>
    </header>

    <main class="pagmar__export-main" aria-label="ייצוא קמע">
      <div class="pagmar__export-stage">
        <div class="pagmar__export-card" id="exportCard">
        <div class="pagmar__export-vectors" aria-hidden="true">
          <div class="pagmar__export-vector" id="exportVectorQ1"></div>
          <div class="pagmar__export-vector" id="exportVectorQ2"></div>
          <div class="pagmar__export-vector" id="exportVectorQ3"></div>
        </div>

        <div class="pagmar__export-name-bg" aria-hidden="true"></div>
        <p class="pagmar__export-name" id="exportName"></p>

        <div class="pagmar__export-timing-block">
          <span class="pagmar__export-tag">[תזמון]</span>
          <p class="pagmar__export-timing" id="exportTiming"></p>
        </div>

        <p class="pagmar__export-outcome" id="exportOutcome"></p>

        <p class="pagmar__export-wish" id="exportWish"></p>

        <div class="pagmar__export-amulet-frame" aria-label="קמע מסתובב">
          <div class="pagmar__export-amulet-slot" id="exportAmulet3D"></div>
        </div>
        </div>

        <div class="pagmar__export-barcode-block">
          <span class="pagmar__export-tag pagmar__export-barcode-tag">[לייצוא קמע]</span>
          <div class="pagmar__export-barcode-glass glass-lens" data-glass-source="export-fog">
            <div class="glass-lens__backdrop" aria-hidden="true">
              <div class="glass-clone" aria-hidden="true">
                <canvas class="glass-clone__capture" aria-hidden="true"></canvas>
              </div>
              <div class="glass-lens__tint" aria-hidden="true"></div>
              <div class="glass-chrome" aria-hidden="true"></div>
            </div>
            <div
              class="pagmar__export-barcode-slot"
              id="exportBarcodeSlot"
              aria-label="ברקוד לפתיחת התמונה בטלפון"
            ></div>
          </div>
        </div>
      </div>

      <div class="pagmar__export-actions">
        <button type="button" class="pagmar__export-action-btn" id="exportSaveBtn">שמור קמע</button>
        <button type="button" class="pagmar__export-action-btn pagmar__export-action-btn--filled" id="exportCreateAnotherBtn">ליצירת קמע נוסף</button>
      </div>
    </main>
  </div>

  <script src="vendor/qrcode-generator.js?v=20250712-export-barcode"></script>
  <script>
    if (typeof qrcode === 'function') window.qrcode = qrcode;
  </script>
  <script src="glass-lens.js?v=20250710-export-view"></script>
  <script src="questions.js?v=20250710-export-view"></script>
  <script type="module" src="export-view.js?v=20250712-export-loader-fog"></script>
</body>
</html>
