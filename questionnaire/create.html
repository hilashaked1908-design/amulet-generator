<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>קמע — יצירה</title>
  <link rel="stylesheet" href="../css/fonts.css?v=20250702-white">
  <link rel="stylesheet" href="../css/questionnaire.css?v=20250708-close-align">
  <link rel="stylesheet" href="../css/buttons.css?v=20250708-close-align">
  <link rel="stylesheet" href="../css/request-flow-figma.css?v=20250708-close-align">
  <link rel="stylesheet" href="../css/result-overlay.css?v=20250708-close-align">
</head>
<body class="pagmar-create">

  <div class="pagmar-viewport">
    <div class="pagmar-canvas" id="pagmarCanvas" aria-label="יצירת קמע">

      <div class="pagmar__stage" id="questionStage">
        <div
          class="pagmar__garden"
          id="questionGarden"
          aria-hidden="true"
        ></div>
      </div>

      <div class="pagmar__create-flow pagmar__request-flow" id="createFlow">
        <div class="pagmar__request-artboard" id="requestArtboard">

          <div class="figma-layer figma-panel" aria-hidden="true">
            <div class="figma-panel__inner">
              <div class="figma-amulet pagmar__request-amulet-build pagmar__create-amulet-frame" aria-label="מסגרת הקמע">
                <img class="figma-amulet__ellipse" src="assets/detail/amulet-ellipse.svg" alt="" decoding="async" draggable="false" aria-hidden="true">
                <div
                  id="amuletContainer"
                  class="pagmar__create-amulet-view result__amulet"
                  role="img"
                  aria-label="קמע — גררי לסיבוב"
                ></div>
                <p id="amuletStatus" class="pagmar__create-status" aria-live="polite" hidden>טוען קמע</p>
              </div>
            </div>
          </div>

          <button type="button" class="figma-layer figma-close" id="requestCloseBtn" aria-label="סגור">
            <img src="assets/detail/close-icon.svg" alt="" decoding="async" draggable="false">
          </button>

          <div class="figma-layer figma-step-rail__line figma-step-rail__line--137" aria-hidden="true"></div>
          <div class="figma-layer figma-step-rail__line figma-step-rail__line--progress" aria-hidden="true"></div>

          <div class="figma-layer figma-step-marker figma-step-marker--8" data-step="8" aria-hidden="true">
            <div class="figma-step-marker__pill" aria-hidden="true"></div>
            <span class="figma-step-marker__num">8</span>
          </div>
          <div class="figma-layer figma-step-marker figma-step-marker--7" data-step="7" aria-hidden="true">
            <div class="figma-step-marker__pill" aria-hidden="true"></div>
            <span class="figma-step-marker__num">7</span>
          </div>
          <div class="figma-layer figma-step-marker figma-step-marker--6" data-step="6" aria-hidden="true">
            <div class="figma-step-marker__pill" aria-hidden="true"></div>
            <span class="figma-step-marker__num">6</span>
          </div>
          <div class="figma-layer figma-step-marker figma-step-marker--5" data-step="5" aria-hidden="true">
            <div class="figma-step-marker__pill" aria-hidden="true"></div>
            <span class="figma-step-marker__num">5</span>
          </div>
          <div class="figma-layer figma-step-marker figma-step-marker--4" data-step="4" aria-hidden="true">
            <div class="figma-step-marker__pill" aria-hidden="true"></div>
            <span class="figma-step-marker__num">4</span>
          </div>
          <div class="figma-layer figma-step-marker figma-step-marker--3" data-step="3" aria-hidden="true">
            <div class="figma-step-marker__pill" aria-hidden="true"></div>
            <span class="figma-step-marker__num">3</span>
          </div>
          <div class="figma-layer figma-step-marker figma-step-marker--2" data-step="2" aria-hidden="true">
            <div class="figma-step-marker__pill" aria-hidden="true"></div>
            <span class="figma-step-marker__num">2</span>
          </div>
          <div class="figma-layer figma-step-marker figma-step-marker--1 is-active" data-step="1" aria-current="step">
            <div class="figma-step-marker__pill" aria-hidden="true"></div>
            <span class="figma-step-marker__num">1</span>
          </div>

          <div class="figma-layer figma-q figma-q--slot-0" id="requestActiveCard">
            <div
              class="figma-q__panel"
              id="questionFrame"
              role="region"
              aria-labelledby="questionText"
            >
              <div class="figma-q__head">
                <span class="figma-q__tag" id="questionTag">[בקשה]</span>
                <p class="figma-q__title" id="questionText"></p>
              </div>
              <p class="figma-q__desc" id="questionDesc" hidden></p>
              <div class="figma-q__actions">
                <div class="figma-q__field-box">
                  <div class="figma-q__field" id="questionField"></div>
                </div>
                <div class="figma-q__btn-outer">
                  <img class="figma-q__btn-corner figma-q__btn-corner--tl" src="assets/create/figma-2120/btn-corner-tl.svg" alt="" decoding="async" draggable="false" aria-hidden="true">
                  <img class="figma-q__btn-corner figma-q__btn-corner--tr" src="assets/create/figma-2120/btn-corner-tr.svg" alt="" decoding="async" draggable="false" aria-hidden="true">
                  <img class="figma-q__btn-corner figma-q__btn-corner--bl" src="assets/create/figma-2120/btn-corner-tl.svg" alt="" decoding="async" draggable="false" aria-hidden="true">
                  <img class="figma-q__btn-corner figma-q__btn-corner--br" src="assets/create/figma-2120/btn-corner-br.svg" alt="" decoding="async" draggable="false" aria-hidden="true">
                  <button type="button" class="figma-q__btn" id="questionSubmit" disabled>
                    <span class="figma-q__btn-label">לשאלה הבאה</span>
                  </button>
                </div>
              </div>
            </div>
          </div>

        </div>

        <span class="pagmar__create-question-num" id="questionLabel" hidden aria-hidden="true"></span>
      </div>

      <button type="button" class="pagmar__export-btn" id="exportAmuletBtn" hidden>
        ייצוא כתמונה
      </button>

      <!-- Result overlay — Figma 2436:9214 (questionnaire result) -->
      <div class="pagmar__result-overlay" id="resultOverlay" hidden>
        <div class="pagmar__result-fog" id="resultFogHost" aria-hidden="true"></div>

        <div class="pagmar-canvas pagmar-canvas--result">

          <button type="button" class="pagmar__result-close" id="resultCloseBtn" aria-label="סגור">
            <img src="assets/detail/close-icon.svg" width="16.119" height="21.235" alt="">
          </button>

          <main class="pagmar__result-main">

            <aside class="pagmar__result-sidebar" aria-label="מפרט קמע">
              <div class="pagmar__result-spec-row pagmar__result-spec-row--belonging">
                <section class="pagmar__result-belonging" aria-label="שייכות">
                  <div class="pagmar__result-field">
                    <span class="pagmar__result-tag">[שייכות]</span>
                    <p class="pagmar__result-field-text" id="resultName">—</p>
                  </div>
                </section>
                <div class="pagmar__result-vector pagmar__result-vector--belonging" id="resultVectorBelonging" aria-hidden="true"></div>
              </div>

              <div class="pagmar__result-spec-row pagmar__result-spec-row--timing">
                <section class="pagmar__result-timing pagmar__result-section--ruled" aria-label="תזמון">
                  <div class="pagmar__result-field">
                    <span class="pagmar__result-tag">[תזמון]</span>
                    <p class="pagmar__result-field-text" id="resultTiming">—</p>
                  </div>
                </section>
                <div class="pagmar__result-vector pagmar__result-vector--timing" id="resultVectorTiming" aria-hidden="true"></div>
              </div>

              <section class="pagmar__result-components pagmar__result-section--ruled" aria-labelledby="resultComponentsLabel">
                <div class="pagmar__result-components-inner">
                  <span class="pagmar__result-tag" id="resultComponentsLabel">[מרכיבים]</span>
                  <ul class="pagmar__result-components-list" id="resultComponents"></ul>
                </div>
              </section>

              <section class="pagmar__result-tags pagmar__result-section--ruled" aria-labelledby="resultTagsLabel">
                <span class="pagmar__result-tag" id="resultTagsLabel">[תגיות]</span>
                <ul class="pagmar__result-tags-list" id="resultTags"></ul>
              </section>
            </aside>

            <span class="pagmar__result-num pagmar__glass-pill" id="resultNum">
              <span class="pagmar__glass-pill__text">[001]</span>
            </span>

            <figure class="pagmar__result-amulet" aria-label="קמע מסתובב">
              <div class="pagmar__result-amulet-frame">
                <div id="resultAmulet3D" class="pagmar__result-amulet-3d"></div>
              </div>
              <img
                class="pagmar__result-amulet-ellipse"
                src="assets/detail/amulet-ellipse.svg"
                alt=""
                decoding="async"
                draggable="false"
                aria-hidden="true"
              >
            </figure>

            <aside class="pagmar__result-right" aria-label="בקשה">
              <section class="pagmar__result-request">
                <span class="pagmar__result-tag">[בקשה]</span>
                <p class="pagmar__result-story" id="resultStory">—</p>
              </section>
              <div class="pagmar__result-vector pagmar__result-vector--request" id="resultVectorRequest" aria-hidden="true"></div>
            </aside>

          </main>

          <div class="pagmar__result-action-btn pagmar__result-action-btn--export figma-q__btn-outer" id="resultExportBtnWrap">
            <img class="figma-q__btn-corner figma-q__btn-corner--tl" src="assets/create/figma-2120/btn-corner-tl.svg" alt="" decoding="async" draggable="false" aria-hidden="true">
            <img class="figma-q__btn-corner figma-q__btn-corner--tr" src="assets/create/figma-2120/btn-corner-tr.svg" alt="" decoding="async" draggable="false" aria-hidden="true">
            <img class="figma-q__btn-corner figma-q__btn-corner--bl" src="assets/create/figma-2120/btn-corner-tl.svg" alt="" decoding="async" draggable="false" aria-hidden="true">
            <img class="figma-q__btn-corner figma-q__btn-corner--br" src="assets/create/figma-2120/btn-corner-br.svg" alt="" decoding="async" draggable="false" aria-hidden="true">
            <button type="button" class="figma-q__btn" id="resultExportBtn">ייצא קמע</button>
          </div>

          <div class="pagmar__result-action-btn pagmar__result-action-btn--save figma-q__btn-outer" id="resultSaveBtnWrap">
            <img class="figma-q__btn-corner figma-q__btn-corner--tl" src="assets/create/figma-2120/btn-corner-tl.svg" alt="" decoding="async" draggable="false" aria-hidden="true">
            <img class="figma-q__btn-corner figma-q__btn-corner--tr" src="assets/create/figma-2120/btn-corner-tr.svg" alt="" decoding="async" draggable="false" aria-hidden="true">
            <img class="figma-q__btn-corner figma-q__btn-corner--bl" src="assets/create/figma-2120/btn-corner-tl.svg" alt="" decoding="async" draggable="false" aria-hidden="true">
            <img class="figma-q__btn-corner figma-q__btn-corner--br" src="assets/create/figma-2120/btn-corner-br.svg" alt="" decoding="async" draggable="false" aria-hidden="true">
            <button type="button" class="figma-q__btn" id="resultSaveBtn">שמור קמע</button>
          </div>

        </div>
      </div>

    </div>
  </div>

  <script src="../connection-core.js"></script>
  <script src="questions.js?v=20250704-2258-fonts"></script>
  <script src="amulet-catalog.js?v=20250704b"></script>
  <script src="garden-atmosphere.js?v=20250707-loader-garden"></script>
  <script src="garden-stars.js?v=20250704b"></script>
  <script type="module" src="garden-three.js?v=20250707-no-opacity-fade"></script>
  <script type="module" src="amulet-show.js?v=20250708-result-answers"></script>
  <script type="module" src="amulet-build.js?v=20250707-semantic-click"></script>
  <script src="button-roll.js?v=20250707-k95-cursor"></script>
  <script type="module" src="questionnaire-ui.js?v=20250708-result-2436"></script>
</body>
</html>
