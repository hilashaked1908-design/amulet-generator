  <style>
    /* One keyframe + phased delays = seamless 1→2→3→4→1 loop */
    .pagmar__detail-page-loader__vessels {
      isolation: isolate;
      transform: translateZ(0);
    }
    .pagmar__detail-page-loader__vessel {
      will-change: opacity;
      transform: translate3d(-50%, -50%, 0);
      opacity: 0;
      animation-name: pagmar-detail-vessel-slot;
      animation-duration: 4s;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      animation-fill-mode: both;
      animation-play-state: running !important;
    }
    .pagmar__detail-page-loader__vessel--1 { animation-delay: 0s; }
    .pagmar__detail-page-loader__vessel--2 { animation-delay: -1s; }
    .pagmar__detail-page-loader__vessel--3 { animation-delay: -2s; }
    .pagmar__detail-page-loader__vessel--4 { animation-delay: -3s; }
    @keyframes pagmar-detail-vessel-slot {
      0%, 24.999% { opacity: 1; }
      25%, 100% { opacity: 0; }
    }
  </style>
  <script src="garden-atmosphere.js?v=20250708-detail-garden-bg"></script>
  <script>
    (function () {
      document.documentElement.classList.add('pagmar-detail-booting');
      window.pagmarDetailBoot = {
        _startedAt: Date.now(),
        MIN_MS: 350,
        FAILSAFE_MS: 45000,
        _pending: { fonts: 1, content: 1, scene: 1, vectors: 1 },
        _finished: false,
        done: function (key) {
          if (this._finished || !this._pending[key]) return;
          delete this._pending[key];
          if (!Object.keys(this._pending).length) this.finish();
        },
        finish: function () {
          if (this._finished) return;
          var self = this;
          var wait = Math.max(0, this.MIN_MS - (Date.now() - this._startedAt));
          window.setTimeout(function () {
            self._finishNow();
          }, wait);
        },
        _finishNow: function () {
          if (this._finished) return;
          this._finished = true;
          var loader = document.getElementById('detailPageLoader');
          var body = document.body;
          if (loader) loader.classList.add('is-leaving');
          window.setTimeout(function () {
            if (body) body.classList.remove('is-detail-loading');
            document.documentElement.classList.remove('pagmar-detail-booting');
            if (loader) {
              loader.hidden = true;
              loader.setAttribute('aria-busy', 'false');
            }
          }, 320);
        },
      };

      window.setTimeout(function () {
        if (!window.pagmarDetailBoot || window.pagmarDetailBoot._finished) return;
        console.warn('[amulet-detail] loader failsafe - still pending:', Object.keys(window.pagmarDetailBoot._pending));
        window.pagmarDetailBoot._finishNow();
      }, window.pagmarDetailBoot.FAILSAFE_MS);

      import('./amulet-detail-fog.js')
        .then(function (mod) {
          var host = document.getElementById('detailFogHost');
          if (!host || typeof mod.bootDetailFogWebGL !== 'function') return;
          mod.bootDetailFogWebGL(host);
        })
        .catch(function (err) {
          console.warn('[amulet-detail] fog WebGL boot failed', err);
        });

      import('./amulet-detail-vectors.js?v=20250710-vector-wrap')
        .then(function (mod) {
          if (typeof mod.bootDetailVectors === 'function') {
            return mod.bootDetailVectors();
          }
          if (window.pagmarDetailBoot) window.pagmarDetailBoot.done('vectors');
        })
        .catch(function (err) {
          console.warn('[amulet-detail] vectors boot failed', err);
          if (window.pagmarDetailBoot) window.pagmarDetailBoot.done('vectors');
        });

      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(function () {
          window.pagmarDetailBoot.done('fonts');
        });
      } else {
        window.pagmarDetailBoot.done('fonts');
      }

      var idMatch = location.search.match(/[?&]id=(\d+)/);
      var detailId = idMatch ? parseInt(idMatch[1], 10) : 0;
      if (Number.isFinite(detailId) && detailId >= 0) {
        ['fetch', 'image'].forEach(function (as) {
          var link = document.createElement('link');
          link.rel = 'preload';
          link.as = as;
          link.href = as === 'fetch'
            ? '/public/amulets/amulet-' + detailId + '.answers.json?v=1'
            : '/public/amulets/amulet-' + detailId + '.png';
          document.head.appendChild(link);
        });
      }

      [
        'assets/detail/loader-vessel-1.svg',
        'assets/detail/loader-vessel-2.svg',
        'assets/detail/loader-vessel-3.svg',
        'assets/detail/loader-vessel-4.svg',
      ].forEach(function (href) {
        var link = document.createElement('link');
        link.rel = 'preload';
        link.as = 'image';
        link.href = href;
        document.head.appendChild(link);
      });
      [
        '../fonts/NarkissYair-Regular-TRIAL.otf',
        '../fonts/LavaProHL-Thin.ttf',
        '../fonts/TheBasics-Regular.otf',
        '../fonts/DavidLibre-Regular.ttf',
      ].forEach(function (href) {
        var link = document.createElement('link');
        link.rel = 'preload';
        link.as = 'font';
        link.type = href.endsWith('.otf') ? 'font/otf' : 'font/ttf';
        link.href = href;
        link.crossOrigin = 'anonymous';
        document.head.appendChild(link);
      });
      var cloudPreload = document.createElement('link');
      cloudPreload.rel = 'preload';
      cloudPreload.as = 'image';
      cloudPreload.href = 'assets/atmosphere/cloud.png';
      document.head.appendChild(cloudPreload);
    })();
  </script>
  <script>
    (function () {
      /* Block ghost pointerup from garden navigation; allow real close presses immediately */
      var closeArmed = false;

      document.addEventListener(
        'pointerdown',
        function (e) {
          if (e.button !== 0) return;
          if (e.target && e.target.closest && e.target.closest('.pagmar__detail-close')) {
            closeArmed = true;
          }
        },
        true
      );

      function shouldBlockGhostClose(target) {
        return (
          !closeArmed &&
          target &&
          target.closest &&
          target.closest('.pagmar__detail-close')
        );
      }

      document.addEventListener(
        'click',
        function (e) {
          if (shouldBlockGhostClose(e.target)) {
            e.preventDefault();
            e.stopImmediatePropagation();
            return;
          }
          closeArmed = false;
        },
        true
      );

      document.addEventListener(
        'pointerup',
        function (e) {
          if (shouldBlockGhostClose(e.target)) {
            e.preventDefault();
            e.stopImmediatePropagation();
          }
        },
        true
      );
    })();
  </script>
</head>
