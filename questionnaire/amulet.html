<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>קמע — מידע</title>
  <link rel="stylesheet" href="../css/fonts.css?v=20250706-detail-layout">
  <link rel="stylesheet" href="../css/amulet-detail.css?v=20250708-detail-bottom-margin">
  <link rel="stylesheet" href="../css/buttons.css?v=20250708-detail-chrome-right">
  <style>
    /* One keyframe + phased delays = seamless 1→2→3→4→1 loop */
    .pagmar__detail-page-loader__vessels {
      isolation: isolate;
      transform: translateZ(0);
    }
    .pagmar__detail-page-loader__vessel {
      will-change: opacity;
      transform: translate3d(-50%, -50%, 0);
      opacity: 0;
      animation-name: pagmar-detail-vessel-slot;
      animation-duration: 4s;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      animation-fill-mode: both;
      animation-play-state: running !important;
    }
    .pagmar__detail-page-loader__vessel--1 { animation-delay: 0s; }
    .pagmar__detail-page-loader__vessel--2 { animation-delay: -1s; }
    .pagmar__detail-page-loader__vessel--3 { animation-delay: -2s; }
    .pagmar__detail-page-loader__vessel--4 { animation-delay: -3s; }
    @keyframes pagmar-detail-vessel-slot {
      0%, 24.999% { opacity: 1; }
      25%, 100% { opacity: 0; }
    }
  </style>
  <script src="garden-atmosphere.js?v=20250707-detail-filter-bg"></script>
  <script>
    (function () {
      document.documentElement.classList.add('pagmar-detail-booting');
      window.pagmarDetailBoot = {
        _startedAt: Date.now(),
        MIN_MS: 350,
        _pending: { fonts: 1, content: 1, scene: 1 },
        _finished: false,
        done: function (key) {
          if (this._finished || !this._pending[key]) return;
          delete this._pending[key];
          if (!Object.keys(this._pending).length) this.finish();
        },
        finish: function () {
          if (this._finished) return;
          var self = this;
          var wait = Math.max(0, this.MIN_MS - (Date.now() - this._startedAt));
          window.setTimeout(function () {
            self._finishNow();
          }, wait);
        },
        _finishNow: function () {
          if (this._finished) return;
          this._finished = true;
          var loader = document.getElementById('detailPageLoader');
          var body = document.body;
          if (loader) loader.classList.add('is-leaving');
          window.setTimeout(function () {
            if (body) body.classList.remove('is-detail-loading');
            document.documentElement.classList.remove('pagmar-detail-booting');
            if (loader) {
              loader.hidden = true;
              loader.setAttribute('aria-busy', 'false');
            }
          }, 320);
        },
      };

      import('./amulet-detail-fog.js')
        .then(function (mod) {
          var host = document.getElementById('detailFogHost');
          if (!host || typeof mod.bootDetailFogWebGL !== 'function') return;
          mod.bootDetailFogWebGL(host);
        })
        .catch(function (err) {
          console.warn('[amulet-detail] fog WebGL boot failed', err);
        });

      import('./amulet-detail-vectors.js?v=20250708-detail-vector-no-intersect')
        .then(function (mod) {
          if (typeof mod.bootDetailVectors === 'function') {
            return mod.bootDetailVectors();
          }
        })
        .catch(function (err) {
          console.warn('[amulet-detail] vectors boot failed', err);
        });

      window.setTimeout(function () {
        window.pagmarDetailBoot._finishNow();
      }, 6000);
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(function () {
          window.pagmarDetailBoot.done('fonts');
        });
      } else {
        window.pagmarDetailBoot.done('fonts');
      }

      var idMatch = location.search.match(/[?&]id=(\d+)/);
      var detailId = idMatch ? parseInt(idMatch[1], 10) : 0;
      if (Number.isFinite(detailId) && detailId >= 0) {
        ['fetch', 'image'].forEach(function (as) {
          var link = document.createElement('link');
          link.rel = 'preload';
          link.as = as;
          link.href = as === 'fetch'
            ? '/public/amulets/amulet-' + detailId + '.answers.json?v=1'
            : '/public/amulets/amulet-' + detailId + '.png';
          document.head.appendChild(link);
        });
      }

      [
        'assets/detail/loader-vessel-1.svg',
        'assets/detail/loader-vessel-2.svg',
        'assets/detail/loader-vessel-3.svg',
        'assets/detail/loader-vessel-4.svg',
      ].forEach(function (href) {
        var link = document.createElement('link');
        link.rel = 'preload';
        link.as = 'image';
        link.href = href;
        document.head.appendChild(link);
      });
      var cloudPreload = document.createElement('link');
      cloudPreload.rel = 'preload';
      cloudPreload.as = 'image';
      cloudPreload.href = 'assets/atmosphere/cloud.png';
      document.head.appendChild(cloudPreload);
    })();
  </script>
  <script>
    (function () {
      var NAV_GUARD_MS = 900;
      var landedAt = Date.now();
      try {
        var stored = sessionStorage.getItem('pagmarAmuletNavAt');
        if (stored) {
          var parsed = parseInt(stored, 10);
          if (Number.isFinite(parsed)) landedAt = parsed;
          sessionStorage.removeItem('pagmarAmuletNavAt');
        }
      } catch (_) {}

      function shouldBlockNavClick(target) {
        return (
          Date.now() - landedAt < NAV_GUARD_MS &&
          target &&
          target.closest &&
          target.closest('.pagmar__detail-close')
        );
      }

      document.addEventListener(
        'click',
        function (e) {
          if (shouldBlockNavClick(e.target)) {
            e.preventDefault();
            e.stopImmediatePropagation();
          }
        },
        true
      );

      document.addEventListener(
        'pointerup',
        function (e) {
          if (shouldBlockNavClick(e.target)) {
            e.preventDefault();
            e.stopImmediatePropagation();
          }
        },
        true
      );
    })();
  </script>
</head>
