<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>אב-טיפוס קמע — Prototype</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, "Segoe UI", sans-serif;
      background: #ececec;
      color: #222;
      font-size: 14px;
      line-height: 1.5;
    }
    header {
      background: #1a1a1a;
      color: #eee;
      padding: 14px 20px;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header p { font-size: 0.8rem; color: #aaa; margin-top: 4px; }
    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 380px) 1fr;
      gap: 0;
      min-height: calc(100vh - 56px);
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }
    .panel {
      background: #f8f8f8;
      border-left: 1px solid #ccc;
      padding: 16px 18px;
      overflow-y: auto;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .opt-btn {
      padding: 6px 10px;
      border: 1px solid #bbb;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: inherit;
      color: #333;
      transition: background 0.1s, border-color 0.1s;
    }
    .opt-btn:hover { background: #efefef; }
    .opt-btn.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }
    #sentence {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #bbb;
      border-radius: 4px;
      font-size: 1rem;
      font-family: inherit;
    }
    #createBtn {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      background: #2a5;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    #createBtn:hover { background: #248a42; }
    #createBtn:disabled { opacity: 0.5; cursor: default; }
    .preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px;
      background: #e8e8e8;
      gap: 12px;
    }
    #resultWrap {
      background: #fff;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
    }
    #resultWrap svg { display: block; }
    #status {
      font-size: 0.85rem;
      color: #444;
      text-align: center;
      max-width: 680px;
    }
    #debugList {
      font-family: monospace, "Courier New", Courier, monospace;
      font-size: 11px;
      direction: ltr;
      text-align: left;
      background: #fff;
      color: #222;
      border: 1px dashed #999;
      padding: 8px 12px;
      min-width: 220px;
    }
    #debugList ul { margin: 4px 0 0; padding: 0; list-style: none; }
    .hint {
      font-size: 0.75rem;
      color: #888;
      margin-top: 12px;
    }
    .hint code { direction: ltr; unicode-bidi: embed; }
  </style>
</head>
<body>
  <header>
    <h1>אב-טיפוס — יצירת קמע מפרמטרים</h1>
    <p>טוען גליפים מ־glyphs/ וחיבורים מ־connections.json · דורש python3 server.py</p>
  </header>

  <div class="layout">
    <aside class="panel">
      <div class="field" data-group="amuletType">
        <label>סוג קמע</label>
        <div class="btn-row">
          <button type="button" class="opt-btn active" data-value="protection">הגנה</button>
          <button type="button" class="opt-btn" data-value="summoning">זימון</button>
        </div>
      </div>

      <div class="field" data-group="domain">
        <label>תחום</label>
        <div class="btn-row">
          <button type="button" class="opt-btn active" data-value="love">אהבה</button>
          <button type="button" class="opt-btn" data-value="livelihood">פרנסה</button>
          <button type="button" class="opt-btn" data-value="health">בריאות</button>
          <button type="button" class="opt-btn" data-value="family">משפחה</button>
          <button type="button" class="opt-btn" data-value="selfConfidence">ביטחון עצמי</button>
          <button type="button" class="opt-btn" data-value="meaning">משמעות וזהות</button>
          <button type="button" class="opt-btn" data-value="housing">מגורים</button>
        </div>
      </div>

      <div class="field" data-group="age">
        <label>גיל</label>
        <div class="btn-row">
          <button type="button" class="opt-btn" data-value="under18">−18</button>
          <button type="button" class="opt-btn" data-value="18-24">18–24</button>
          <button type="button" class="opt-btn active" data-value="25-34">25–34</button>
          <button type="button" class="opt-btn" data-value="35-44">35–44</button>
          <button type="button" class="opt-btn" data-value="45-59">45–59</button>
          <button type="button" class="opt-btn" data-value="60-70">60–70</button>
          <button type="button" class="opt-btn" data-value="70plus">70+</button>
        </div>
      </div>

      <div class="field" data-group="gender">
        <label>מגדר</label>
        <div class="btn-row">
          <button type="button" class="opt-btn active" data-value="female">נקבה</button>
          <button type="button" class="opt-btn" data-value="nonbinary">לא בינארי</button>
          <button type="button" class="opt-btn" data-value="male">זכר</button>
        </div>
      </div>

      <div class="field" data-group="urgency">
        <label>דחיפות</label>
        <div class="btn-row">
          <button type="button" class="opt-btn" data-value="far">עתיד רחוק</button>
          <button type="button" class="opt-btn" data-value="year">שנה הקרובה</button>
          <button type="button" class="opt-btn" data-value="month">חודש הקרוב</button>
          <button type="button" class="opt-btn active" data-value="now">עכשיו</button>
        </div>
      </div>

      <div class="field">
        <label for="sentence">משפט כוונה</label>
        <input id="sentence" type="text" placeholder="לדוגמה: בית גדול בתאילנד אמן" value="בית גדול בתאילנד אמן">
      </div>

      <button type="button" id="createBtn">צור קמע</button>

      <p class="hint">סוג קמע → חיבורים · תחום → צבע קו · גיל → מרקם · מגדר → פינות · דחיפות → מרווח<br>
        פתחי דרך <code>http://localhost:8080/prototype.html</code></p>
    </aside>

    <main class="preview">
      <div id="resultWrap">
        <svg id="resultSvg" width="680" height="680" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
          <rect width="680" height="680" fill="#ffffff"/>
          <text x="340" y="340" text-anchor="middle" fill="#bbb" font-family="monospace" font-size="14">לחצי «צור קמע»</text>
        </svg>
      </div>
      <p id="status">—</p>
      <div id="debugList" hidden></div>
    </main>
  </div>

  <script src="connection-core.js"></script>
  <script>
(function () {
  'use strict';

  /* --- Canvas --- */
  const HEB = 'אבגדהוזחטיכלמנסעפצקרשת'.split('');
  const W = 680;
  const H = 680;
  const CX = 340;
  const CY = 340;
  const GLYPHS_DIR = 'glyphs';
  const MAX_LETTERS = 8;
  const HUB_OVERLAP_DIST = 80;
  const DEFAULT_GLYPH_SIZE = 150;

  const BG_WHITE = '#ffffff';
  const VIEWBOX_PAD = 45;
  const FILTER_ID_COMBINED = 'combined';

  /** גיל → bump roughness only (gloss is always in combined filter) */
  const AGE_BUMP_SCALE = {
    under18: 0,
    '18-24': 2,
    '25-34': 4,
    '35-44': 6,
    '45-59': 9,
    '60-70': 15,
    '70plus': 22
  };

  /** תחום → צבע מעבר Pass 2 */
  const DOMAINS = {
    love: { stroke: '#D7A2B4' },
    livelihood: { stroke: '#C8ED14' },
    health: { stroke: '#cccccc' },
    family: { stroke: '#6D6455' },
    selfConfidence: { stroke: '#362514' },
    meaning: { stroke: '#6C3711' },
    housing: { stroke: '#8B7355' }
  };

  const GENDER_SCALE_FEMALE = 1.08;
  const GENDER_SCALE_MALE = 1.0;
  const GENDER_SCALE_NONBINARY = 1.03;

  const GENDER_VISUAL = {
    female: {
      linecap: 'round',
      linejoin: 'round',
      miterlimit: null,
      scale: GENDER_SCALE_FEMALE
    },
    nonbinary: {
      linecap: 'round',
      linejoin: 'round',
      miterlimit: null,
      scale: GENDER_SCALE_NONBINARY
    },
    male: {
      linecap: 'square',
      linejoin: 'miter',
      miterlimit: 2,
      scale: GENDER_SCALE_MALE
    }
  };

  /* --- Spacing (distance from center; dramatic range) --- */
  const URGENCY_SPACING = {
    far: 1.8,
    year: 1.45,
    month: 1.15,
    now: 0.5
  };

  /* --- Intent keys (match connections.json) --- */
  const INTENT_TYPES = ['protection', 'summoning', 'grounding'];

  const BUILTIN_SYMBOLS = {
    circle: { viewBox: '0 0 100 100' },
    triangle: { viewBox: '0 0 100 100' },
    arc: { viewBox: '0 0 100 100' },
    dot: { viewBox: '0 0 100 100' }
  };

  let glyphLetters = [];
  const glyphSvgCache = {};
  const parsedGlyphCache = {};
  let connections = [];

  const params = {
    amuletType: 'protection',
    domain: 'love',
    age: '25-34',
    gender: 'female',
    urgency: 'now'
  };

  function clampNum(n, min, max) {
    return Math.max(min, Math.min(max, n));
  }

  function getGroupValue(group) {
    const btn = document.querySelector('.field[data-group="' + group + '"] .opt-btn.active');
    return btn ? btn.dataset.value : null;
  }

  function readParams() {
    params.amuletType = getGroupValue('amuletType') || 'protection';
    params.domain = getGroupValue('domain') || 'love';
    params.age = getGroupValue('age') || '25-34';
    params.gender = getGroupValue('gender') || 'female';
    params.urgency = getGroupValue('urgency') || 'now';
    return params;
  }

  function visualStyle(p) {
    const strokeByDomain = {
      love: '#D7A2B4',
      livelihood: '#C8ED14',
      health: '#cccccc',
      family: '#6D6455',
      selfConfidence: '#362514',
      meaning: '#6C3711',
      housing: '#8B7355'
    };
    const spacing = URGENCY_SPACING[p.urgency] ?? 1.0;
    const gender = GENDER_VISUAL[p.gender] || GENDER_VISUAL.female;
    const intent = p.amuletType === 'summoning' ? 'summoning' : 'protection';
    const strokeColor = strokeByDomain[p.domain] || strokeByDomain.love;

    let surfaceScale = AGE_BUMP_SCALE[p.age] ?? 4;
    const ageTexture = surfaceScale <= 0 ? 'gloss' : surfaceScale < 9 ? 'gloss+bump' : 'gloss+rough';

    let linecap = 'round';
    let linejoin = 'round';
    let miterlimit = null;
    let spikeCount = 0;
    let spikeLength = 0;
    if (p.gender === 'nonbinary') {
      spikeCount = 80;
      spikeLength = 6;
    } else if (p.gender === 'male') {
      linecap = 'square';
      linejoin = 'miter';
      miterlimit = 2;
      spikeCount = 200;
      spikeLength = 15;
      surfaceScale = Math.min(surfaceScale, 8);
    }

    return {
      amuletType: p.amuletType,
      domainKey: p.domain,
      intent,
      strokeColor,
      spacing,
      amuletScale: gender.scale,
      linecap,
      linejoin,
      miterlimit,
      ageTexture,
      surfaceScale,
      spikeCount,
      spikeLength,
      gender: p.gender
    };
  }

  function buildCombinedFilter(style) {
    const baseFreq =
      style.gender === 'male' ? '0.15' : style.gender === 'nonbinary' ? '0.09' : '0.065';
    return (
      '<filter id="' +
      FILTER_ID_COMBINED +
      '" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">' +
      '<feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>' +
      '<feSpecularLighting in="blur" surfaceScale="8" specularConstant="1.2" specularExponent="50" lighting-color="white" result="gloss">' +
      '<fePointLight x="300" y="150" z="200"/>' +
      '</feSpecularLighting>' +
      '<feMerge result="glossed">' +
      '<feMergeNode in="SourceGraphic"/>' +
      '<feMergeNode in="gloss"/>' +
      '</feMerge>' +
      '<feTurbulence type="fractalNoise" baseFrequency="' +
      baseFreq +
      '" numOctaves="4" seed="2" result="noise"/>' +
      '<feDisplacementMap in="glossed" in2="noise" scale="' +
      style.surfaceScale +
      '" xChannelSelector="R" yChannelSelector="G"/>' +
      '</filter>'
    );
  }

  function buildSvgDefs(style) {
    console.log('surfaceScale:', style.surfaceScale);
    return '<defs>' + buildCombinedFilter(style) + '</defs>';
  }

  function requireConnectionCore() {
    if (!window.ConnectionCore) {
      throw new Error('connection-core.js לא נטען — רענני את הדף');
    }
    return window.ConnectionCore;
  }

  function effectLabel(style) {
    const tex = style.ageTexture !== 'none' ? style.ageTexture : 'neutral';
    const spk = style.spikeCount ? ' spikes=' + style.spikeCount : '';
    return style.amuletType + '/' + style.domainKey + ' · ' + tex + spk + ' · ' + style.linecap;
  }

  function spikeNum(n) {
    return Number(n).toFixed(2);
  }

  function pathDFromSvgPath(svgPath) {
    const s = String(svgPath || '').trim();
    if (!s) return '';
    if (s.charAt(0) !== '<') return s;
    const m = s.match(/\bd\s*=\s*["']([^"']+)["']/i);
    return m ? m[1] : '';
  }

  const SPIKE_STROKE_WIDTH = 45;
  const SPIKE_STROKE_PROXIMITY = 5;

  function distPointToPath(pathEl, x, y) {
    const total = pathEl.getTotalLength();
    if (!total || !isFinite(total)) return Infinity;
    const steps = Math.max(24, Math.ceil(total / 3));
    let best = Infinity;
    for (let i = 0; i <= steps; i++) {
      const pt = pathEl.getPointAtLength((total * i) / steps);
      const d = Math.hypot(pt.x - x, pt.y - y);
      if (d < best) best = d;
    }
    return best;
  }

  /**
   * Sample points along a path, extrude thin outward triangles on the stroke edge.
   * Returns original path + spike polygons in one group (paths first, spikes after).
   */
  function addSpikesToPath(svgPath, numSpikes, spikeLength, strokeWidth) {
    const sw = strokeWidth == null ? SPIKE_STROKE_WIDTH : strokeWidth;
    const strokeHalf = sw / 2;
    const maxDist = strokeHalf + SPIKE_STROKE_PROXIMITY;
    const d = pathDFromSvgPath(svgPath);
    const original =
      String(svgPath || '').trim().charAt(0) === '<'
        ? String(svgPath).trim()
        : '<path fill="none" d="' + d.replace(/"/g, '&quot;') + '"/>';
    const wrap = (inner) => '<g class="path-with-spikes">' + inner + '</g>';
    if (!d || numSpikes < 1 || spikeLength <= 0) {
      return wrap(original);
    }

    const NS = 'http://www.w3.org/2000/svg';
    const measure = document.createElementNS(NS, 'svg');
    measure.setAttribute('width', '0');
    measure.setAttribute('height', '0');
    measure.style.cssText =
      'position:fixed;left:-9999px;top:-9999px;visibility:hidden;pointer-events:none';
    const pathEl = document.createElementNS(NS, 'path');
    pathEl.setAttribute('d', d);
    pathEl.setAttribute('fill', 'none');
    measure.appendChild(pathEl);
    document.body.appendChild(measure);

    const spikePolys = [];
    try {
      const total = pathEl.getTotalLength();
      if (!total || !isFinite(total)) {
        return wrap(original);
      }
      const baseHalf = Math.max(0.5, spikeLength * 0.05);
      const step = Math.min(2, total / Math.max(numSpikes * 2, 1));
      for (let i = 0; i < numSpikes; i++) {
        const t = total * (i + 0.5) / numSpikes;
        const p = pathEl.getPointAtLength(t);
        const pA = pathEl.getPointAtLength(Math.min(total, t + step));
        const pB = pathEl.getPointAtLength(Math.max(0, t - step));
        let tx = pA.x - pB.x;
        let ty = pA.y - pB.y;
        const tm = Math.hypot(tx, ty) || 1;
        tx /= tm;
        ty /= tm;
        let nx = -ty;
        let ny = tx;
        const midX = (p.x + pA.x + pB.x) / 3;
        const midY = (p.y + pA.y + pB.y) / 3;
        const bbox = pathEl.getBBox();
        const cx = bbox.x + bbox.width / 2;
        const cy = bbox.y + bbox.height / 2;
        const outX = midX - cx;
        const outY = midY - cy;
        if (nx * outX + ny * outY < 0) {
          nx = -nx;
          ny = -ny;
        }
        const edgeX = p.x + nx * strokeHalf;
        const edgeY = p.y + ny * strokeHalf;
        if (distPointToPath(pathEl, edgeX, edgeY) > maxDist) {
          continue;
        }
        const tipX2 = edgeX + nx * spikeLength;
        const tipY2 = edgeY + ny * spikeLength;
        const b1x = edgeX - tx * baseHalf;
        const b1y = edgeY - ty * baseHalf;
        const b2x = edgeX + tx * baseHalf;
        const b2y = edgeY + ty * baseHalf;
        const baseMidX = (b1x + b2x) / 2;
        const baseMidY = (b1y + b2y) / 2;
        if (distPointToPath(pathEl, baseMidX, baseMidY) > maxDist) {
          continue;
        }
        spikePolys.push(
          '<polygon class="path-spike" fill="currentColor" stroke="none" points="' +
            spikeNum(tipX2) +
            ',' +
            spikeNum(tipY2) +
            ' ' +
            spikeNum(b1x) +
            ',' +
            spikeNum(b1y) +
            ' ' +
            spikeNum(b2x) +
            ',' +
            spikeNum(b2y) +
            '"/>'
        );
      }
    } finally {
      measure.remove();
    }

    return wrap(original + spikePolys.join(''));
  }

  /** Replace each path with path+spikes group in its parent (same transform as glyph). */
  function embedSpikesInPathsMarkup(html, numSpikes, spikeLength, strokeWidth) {
    if (!html || numSpikes < 1 || spikeLength <= 0) return html;
    const doc = new DOMParser().parseFromString(
      '<svg xmlns="http://www.w3.org/2000/svg"><g id="spike-root">' + html + '</g></svg>',
      'image/svg+xml'
    );
    if (doc.querySelector('parsererror')) return html;
    const root = doc.getElementById('spike-root');
    if (!root) return html;
    root.querySelectorAll('path').forEach((pathEl) => {
      const groupDoc = new DOMParser().parseFromString(
        '<svg xmlns="http://www.w3.org/2000/svg">' +
          addSpikesToPath(pathEl.outerHTML, numSpikes, spikeLength, strokeWidth) +
          '</svg>',
        'image/svg+xml'
      );
      const group = groupDoc.documentElement.firstElementChild;
      if (group && pathEl.parentNode) {
        pathEl.parentNode.replaceChild(doc.importNode(group, true), pathEl);
      }
    });
    return root.innerHTML;
  }

  /**
   * Remove per-path stroke/fill so the stroke pass controls rendering.
   */
  function sanitizePathsInner(html) {
    if (!html) return '';
    try {
      const doc = new DOMParser().parseFromString(
        '<svg xmlns="http://www.w3.org/2000/svg"><g id="root">' + html + '</g></svg>',
        'image/svg+xml'
      );
      if (doc.querySelector('parsererror')) return html;
      doc.querySelectorAll('path,circle,ellipse,line,polyline,polygon').forEach((el) => {
        el.setAttribute('fill', 'none');
        el.removeAttribute('stroke');
        el.removeAttribute('stroke-width');
        el.removeAttribute('stroke-linecap');
        el.removeAttribute('stroke-linejoin');
        el.removeAttribute('stroke-opacity');
        if (el.hasAttribute('style')) {
          const s = el
            .getAttribute('style')
            .replace(/fill\s*:\s*[^;]+;?/gi, 'fill:none;')
            .replace(/stroke\s*:\s*[^;]+;?/gi, '')
            .replace(/stroke-width\s*:\s*[^;]+;?/gi, '');
          el.setAttribute('style', s);
        }
      });
      const root = doc.getElementById('root');
      return root ? root.innerHTML : html;
    } catch (_) {
      return html
        .replace(/\sstroke\s*=\s*["'][^"']*["']/gi, '')
        .replace(/\sstroke-width\s*=\s*["'][^"']*["']/gi, '')
        .replace(/fill\s*=\s*["'](?!none)[^"']*["']/gi, 'fill="none"');
    }
  }

  function strokeAttrs(style, width, filterId) {
    let attrs =
      'fill="none" stroke="' +
      style.strokeColor +
      '" stroke-width="' +
      width +
      '" stroke-linecap="' +
      style.linecap +
      '" stroke-linejoin="' +
      style.linejoin +
      '"';
    if (style.miterlimit != null) {
      attrs += ' stroke-miterlimit="' + style.miterlimit + '"';
    }
    if (filterId) {
      attrs += ' filter="url(#' + filterId + ')"';
    }
    return attrs;
  }

  /** Single pass 45 — paths and spike polygons in the same stroked group. */
  function pathOnePass(pathMarkup, style) {
    let clean = sanitizePathsInner(pathMarkup);
    if (style.spikeCount > 0 && style.spikeLength > 0) {
      clean = embedSpikesInPathsMarkup(
        clean,
        style.spikeCount,
        style.spikeLength,
        SPIKE_STROKE_WIDTH
      );
    }
    const filterId = FILTER_ID_COMBINED;
    return (
      '<g class="path-layers" style="color:' +
      style.strokeColor +
      '"><g ' +
      strokeAttrs(style, SPIKE_STROKE_WIDTH, filterId) +
      '>' +
      clean +
      '</g></g>'
    );
  }

  function pathLayers(pathMarkup, style) {
    return pathOnePass(pathMarkup, style);
  }

  /** Bounding box for mirrored symmetric layout (includes stroke padding). */
  function viewBoxForPlacements(placements) {
    let minX = Infinity;
    let maxX = -Infinity;
    let minY = Infinity;
    let maxY = -Infinity;
    const bump = (x, y) => {
      minX = Math.min(minX, x);
      maxX = Math.max(maxX, x);
      minY = Math.min(minY, y);
      maxY = Math.max(maxY, y);
    };
    for (const p of placements) {
      const r = p.sz / 2 + VIEWBOX_PAD;
      bump(p.x - r, p.y - r);
      bump(p.x + r, p.y + r);
      const mx = W - p.x;
      bump(mx - r, p.y - r);
      bump(mx + r, p.y + r);
    }
    if (!isFinite(minX)) {
      return { x: 0, y: 0, w: W, h: H };
    }
    const bw = maxX - minX;
    const bh = maxY - minY;
    return {
      x: minX,
      y: minY,
      w: Math.max(bw, 120),
      h: Math.max(bh, 120)
    };
  }

  function wrapAmuletScale(content, style) {
    if (style.amuletScale === 1) return content;
    return (
      '<g transform="translate(' +
      CX +
      ',' +
      CY +
      ') scale(' +
      style.amuletScale +
      ') translate(' +
      -CX +
      ',' +
      -CY +
      ')">' +
      content +
      '</g>'
    );
  }

  let composeBusy = false;
  let appReady = false;
  let lastComposeLetters = [];

  document.querySelectorAll('.field[data-group]').forEach((field) => {
    field.querySelectorAll('.opt-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        field.querySelectorAll('.opt-btn').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        readParams();
        composeAmulet();
      });
    });
  });

  function glyphFilename(letter) {
    return letter === 'א' ? 'א1.svg' : letter + '2.svg';
  }

  function letterFromFilename(file) {
    const base = file.replace(/\.svg$/i, '');
    if (base === 'א1') return 'א';
    const m = base.match(/^(.)(?:1|2)$/);
    return m && HEB.includes(m[1]) ? m[1] : null;
  }

  async function loadGlyphManifest() {
    const res = await fetch(GLYPHS_DIR + '/manifest.json');
    if (!res.ok) throw new Error('manifest.json לא נטען');
    const data = await res.json();
    const files = data.files || [];
    glyphLetters = [];
    for (const f of files) {
      const ch = letterFromFilename(f);
      if (ch && !glyphLetters.includes(ch)) glyphLetters.push(ch);
    }
    if (!glyphLetters.length) glyphLetters = HEB.slice();
  }

  async function loadConnections() {
    try {
      const api = await fetch('/api/connections?t=' + Date.now(), { cache: 'no-store' });
      if (api.ok) {
        const data = await api.json();
        connections = data.connections || [];
        return;
      }
    } catch (_) { /* fallback */ }
    const res = await fetch('connections.json?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('connections.json לא נטען');
    const data = await res.json();
    connections = data.connections || [];
  }

  function getFirstLetters(str) {
    const avail = new Set(glyphLetters.length ? glyphLetters : HEB);
    const used = new Set();
    const out = [];
    for (const word of str.split(/\s+/).filter((w) => w.length > 0)) {
      if (out.length >= MAX_LETTERS) break;
      let picked = null;
      for (let i = 0; i < word.length; i++) {
        const ch = word[i];
        if (!avail.has(ch) || used.has(ch)) continue;
        picked = ch;
        break;
      }
      if (picked) {
        used.add(picked);
        out.push(picked);
      }
    }
    return out;
  }

  async function loadGlyphSvg(letter) {
    if (glyphSvgCache[letter]) return glyphSvgCache[letter];
    const url = GLYPHS_DIR + '/' + encodeURIComponent(glyphFilename(letter));
    const res = await fetch(url);
    if (!res.ok) throw new Error('חסר SVG: ' + letter);
    glyphSvgCache[letter] = await res.text();
    return glyphSvgCache[letter];
  }

  function parseGlyphSvg(svgText) {
    const clean = svgText.trim().replace(/^<\?xml[^>]*>\s*/i, '').replace(/^<!DOCTYPE[^>]*>\s*/i, '');
    const doc = new DOMParser().parseFromString(clean, 'image/svg+xml');
    if (doc.querySelector('parsererror')) throw new Error('SVG לא תקין');
    const el = doc.querySelector('svg');
    if (!el) throw new Error('אין svg');
    const vb = el.getAttribute('viewBox') || '0 0 100 100';
    const vbp = vb.trim().split(/[\s,]+/).map(Number);
    const vw = vbp[2] || 100;
    const vh = vbp[3] || 100;
    const raw = el.innerHTML;
    const inner = sanitizePathsInner(raw);
    return { inner, vw, vh, viewBox: el.getAttribute('viewBox') || '0 0 ' + vw + ' ' + vh };
  }

  async function getParsedGlyph(letter) {
    if (parsedGlyphCache[letter]) return parsedGlyphCache[letter];
    const parsed = parseGlyphSvg(await loadGlyphSvg(letter));
    parsedGlyphCache[letter] = parsed;
    return parsed;
  }

  function hubPositionOverlaps(x, y, byLetter, skipLetter) {
    for (const [, pl] of byLetter) {
      if (pl.letter === skipLetter) continue;
      if (Math.hypot(x - pl.x, y - pl.y) < HUB_OVERLAP_DIST) return true;
    }
    return false;
  }

  function hubCandidatesForLetter(letter, anchor, byLetter, intent, CC) {
    const candidates = [];
    const anchorPl = byLetter.get(anchor);
    const anchorConn = CC.findConnectionBetween(connections, anchor, letter, intent);
    if (anchorConn) {
      const pos = CC.placementRelativeTo(anchorConn, anchor, letter, anchorPl.x, anchorPl.y);
      if (pos) candidates.push({ pos, viaAnchor: true });
    }
    for (const [ref, refPl] of byLetter) {
      if (ref === anchor) continue;
      const conn = CC.findConnectionBetween(connections, ref, letter, intent);
      if (!conn) continue;
      const pos = CC.placementRelativeTo(conn, ref, letter, refPl.x, refPl.y);
      if (pos) candidates.push({ pos, viaAnchor: false });
    }
    return candidates;
  }

  function pickHubPlacement(candidates, byLetter, letter) {
    const viaAnchor = candidates.find((c) => c.viaAnchor);
    if (viaAnchor && !hubPositionOverlaps(viaAnchor.pos.x, viaAnchor.pos.y, byLetter, letter)) {
      return viaAnchor.pos;
    }
    for (const c of candidates) {
      if (c.viaAnchor) continue;
      if (!hubPositionOverlaps(c.pos.x, c.pos.y, byLetter, letter)) return c.pos;
    }
    if (viaAnchor) return viaAnchor.pos;
    return candidates.length ? candidates[0].pos : null;
  }

  function buildHubPlacements(letters, intent) {
    const CC = requireConnectionCore();
    const anchor = CC.pickHubAnchor(letters, connections, intent);
    const defaultSz = CC.CANVAS.DEFAULT_SIZE;
    const byLetter = new Map();
    byLetter.set(anchor, {
      letter: anchor,
      x: CX,
      y: CY,
      rotation: 0,
      sz: defaultSz,
      flipX: false,
      flipY: false
    });

    const usedPairs = [];
    const skipped = [];
    for (const letter of letters.filter((ch) => ch !== anchor)) {
      const candidates = hubCandidatesForLetter(letter, anchor, byLetter, intent, CC);
      const pos = pickHubPlacement(candidates, byLetter, letter);
      if (!pos) {
        skipped.push(letter);
        continue;
      }
      byLetter.set(letter, {
        letter: pos.letter,
        x: pos.x,
        y: pos.y,
        rotation: pos.rotation,
        sz: pos.sz,
        flipX: pos.flipX,
        flipY: pos.flipY
      });
      usedPairs.push(pos.pair);
    }

    const placements = [byLetter.get(anchor)];
    for (const ch of letters) {
      if (ch !== anchor && byLetter.has(ch)) placements.push(byLetter.get(ch));
    }
    return { placements, anchor, usedPairs, skipped, byLetter };
  }

  function applySpacingToPlacements(placements, anchor, factor) {
    return placements.map((p) => {
      if (p.letter === anchor) return p;
      return {
        ...p,
        x: CX + (p.x - CX) * factor,
        y: CY + (p.y - CY) * factor
      };
    });
  }

  function getRawConnection(from, to, intent) {
    const matches = connections.filter((c) => c.from === from && c.to === to && c.intent === intent);
    return matches.length ? matches[matches.length - 1] : null;
  }

  function collectConnectionSymbols(usedPairs, intent, byLetter) {
    const CC = requireConnectionCore();
    const out = [];
    const seen = new Set();
    for (const pair of usedPairs) {
      const key = pair.from + '\u2192' + pair.to;
      if (seen.has(key)) continue;
      seen.add(key);
      const raw = getRawConnection(pair.from, pair.to, intent);
      if (!raw?.symbols?.length) continue;
      const norm = CC.normalizeConnection(raw);
      const refPl = byLetter.get(pair.from);
      if (!norm || !refPl) {
        out.push(...raw.symbols);
        continue;
      }
      const ox = norm.fromGlyph.x;
      const oy = norm.fromGlyph.y;
      for (const sym of raw.symbols) {
        out.push({
          ...sym,
          x: refPl.x + (Number(sym.x) - ox),
          y: refPl.y + (Number(sym.y) - oy)
        });
      }
    }
    return out;
  }

  function buildArcPath(cx, cy, r, spanDeg) {
    const span = clampNum(spanDeg, 30, 330);
    const half = (span / 2) * (Math.PI / 180);
    const x1 = cx + r * Math.cos(Math.PI + half);
    const y1 = cy + r * Math.sin(Math.PI + half);
    const x2 = cx + r * Math.cos(Math.PI - half);
    const y2 = cy + r * Math.sin(Math.PI - half);
    const large = span > 180 ? 1 : 0;
    return 'M' + x1.toFixed(2) + ' ' + y1.toFixed(2) + ' A' + r + ' ' + r + ' 0 ' + large + ' 1 ' + x2.toFixed(2) + ' ' + y2.toFixed(2);
  }

  function buildSymbolInner(sym) {
    const t = sym.type;
    if (t === 'circle') return '<circle cx="50" cy="50" r="40"/>';
    if (t === 'dot') return '<circle cx="50" cy="50" r="14"/>';
    if (t === 'triangle') {
      const ratio = clampNum(sym.triangleRatio || 1, 0.5, 2);
      return '<g transform="translate(50 50) scale(' + ratio.toFixed(3) + ' 1) translate(-50 -50)"><path d="M50 12 L88 88 L12 88 Z"/></g>';
    }
    if (t === 'arc') return '<path d="' + buildArcPath(50, 52, 38, sym.arcAngle || 180) + '"/>';
    return '';
  }

  function symbolGroupMarkup(sym, style) {
    if (!BUILTIN_SYMBOLS[sym.type]) return '';
    const size = Number(sym.size) || 64;
    const inner = buildSymbolInner(sym);
    const rot = Number(sym.rotation) || 0;
    const fx = sym.flipX ? -1 : 1;
    const fy = sym.flipY ? -1 : 1;
    const vb = BUILTIN_SYMBOLS[sym.type].viewBox.trim().split(/[\s,]+/).map(Number);
    const vw = vb[2] || 100;
    const vh = vb[3] || 100;
    const half = size / 2;
    return (
      '<g class="amulet-symbol">' +
      '<g transform="translate(' +
      sym.x.toFixed(2) +
      ',' +
      sym.y.toFixed(2) +
      ') rotate(' +
      rot.toFixed(2) +
      ') scale(' +
      fx +
      ',' +
      fy +
      ') translate(' +
      (-half).toFixed(2) +
      ',' +
      (-half).toFixed(2) +
      ')">' +
      '<svg width="' +
      size +
      '" height="' +
      size +
      '" viewBox="0 0 ' +
      vw +
      ' ' +
      vh +
      '" preserveAspectRatio="xMidYMid meet" overflow="visible">' +
      pathLayers(inner, style) +
      '</svg></g></g>'
    );
  }

  /** Positioned glyph paths only (no per-glyph strokes) for unified group rendering. */
  function glyphPathsMarkup(placement, glyph) {
    const vb = glyph.viewBox || '0 0 ' + (glyph.vw || 100) + ' ' + (glyph.vh || 100);
    const vbp = vb.trim().split(/[\s,]+/).map(Number);
    const vw = vbp[2] || 100;
    const vh = vbp[3] || 100;
    const fx = placement.flipX ? -1 : 1;
    const fy = placement.flipY ? -1 : 1;
    const half = placement.sz / 2;
    const rot = Number(placement.rotation) || 0;
    const scaleX = ((placement.sz / vw) * fx).toFixed(4);
    const scaleY = ((placement.sz / vh) * fy).toFixed(4);
    const clean = sanitizePathsInner(glyph.inner);
    return (
      '<g class="amulet-glyph amulet-glyph-' +
      placement.letter +
      '">' +
      '<g transform="translate(' +
      placement.x.toFixed(2) +
      ',' +
      placement.y.toFixed(2) +
      ') rotate(' +
      rot.toFixed(2) +
      ') translate(' +
      (-half).toFixed(2) +
      ',' +
      (-half).toFixed(2) +
      ') scale(' +
      scaleX +
      ',' +
      scaleY +
      ')">' +
      clean +
      '</g></g>'
    );
  }

  function buildUnifiedGlyphRendering(pathsMarkup, style) {
    if (!pathsMarkup) return '';
    return '<g class="amulet-glyphs">' + pathOnePass(pathsMarkup, style) + '</g>';
  }

  function wrapSymmetric(content) {
    return (
      '<g class="amulet-symmetric">' +
      '<g class="amulet-half amulet-original">' +
      content +
      '</g>' +
      '<g class="amulet-half amulet-mirror" transform="translate(' +
      W +
      ',0) scale(-1,1)">' +
      content +
      '</g>' +
      '</g>'
    );
  }

  async function buildAmuletSvg(letters) {
    readParams();
    const style = visualStyle(params);
    document.title =
      'color:' + style.strokeColor + ' age:' + style.ageTexture + ' spikes:' + style.spikeCount;
    const intent = style.intent;
    const unique = [];
    for (const ch of letters) {
      if (!unique.includes(ch)) unique.push(ch);
    }

    let { placements, anchor, usedPairs, skipped, byLetter } = buildHubPlacements(unique, intent);
    placements = applySpacingToPlacements(placements, anchor, style.spacing);
    byLetter = new Map(placements.map((p) => [p.letter, p]));

    const symbols = collectConnectionSymbols(usedPairs, intent, byLetter);

    const symbolParts = symbols.map((sym) => symbolGroupMarkup(sym, style));
    const glyphPathParts = [];
    for (const p of placements) {
      const glyph = await getParsedGlyph(p.letter);
      glyphPathParts.push(glyphPathsMarkup(p, glyph));
    }
    if (!symbolParts.length && !glyphPathParts.length) {
      throw new Error('לא ניתן לצייר אות — בדקי חיבורים וגליפים');
    }

    const unifiedGlyphs = buildUnifiedGlyphRendering(glyphPathParts.join(''), style);
    const groups = symbolParts.join('') + unifiedGlyphs;
    const content = wrapAmuletScale(wrapSymmetric(groups), style);
    const vb = viewBoxForPlacements(placements);
    const svg =
      '<svg xmlns="http://www.w3.org/2000/svg" width="' +
      W +
      '" height="' +
      H +
      '" viewBox="' +
      vb.x +
      ' ' +
      vb.y +
      ' ' +
      vb.w +
      ' ' +
      vb.h +
      '" preserveAspectRatio="xMidYMid meet">' +
      buildSvgDefs(style) +
      '<rect x="' +
      vb.x +
      '" y="' +
      vb.y +
      '" width="' +
      vb.w +
      '" height="' +
      vb.h +
      '" fill="' +
      BG_WHITE +
      '"/>' +
      content +
      '</svg>';
    return { svg, placements, anchor, skipped, viewBox: vb, style };
  }

  function showDebug(placements, anchor, style) {
    const el = document.getElementById('debugList');
    if (!placements.length) {
      el.hidden = true;
      return;
    }
    const rows = placements
      .map((p) => {
        const tag = p.letter === anchor ? ' (hub)' : '';
        return '<li>' + p.letter + tag + ': x=' + p.x.toFixed(1) + ', y=' + p.y.toFixed(1) + '</li>';
      })
      .join('');
    el.innerHTML =
      '<strong>' +
      style.amuletType +
      '/' +
      style.domainKey +
      ' age=' +
      style.ageTexture +
      ' | cap=' +
      style.linecap +
      '/' +
      style.linejoin +
      ' | fx=' +
      effectLabel(style) +
      ' spacing=' +
      style.spacing.toFixed(2) +
      '</strong><ul>' +
      rows +
      '</ul>';
    el.hidden = false;
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  function setResultSvg(svgString) {
    const wrap = document.getElementById('resultWrap');
    const doc = new DOMParser().parseFromString(svgString, 'image/svg+xml');
    const err = doc.querySelector('parsererror');
    if (err) {
      console.error('[prototype] SVG parse error:', err.textContent);
      wrap.innerHTML = svgString;
      return;
    }
    const svgEl = document.importNode(doc.documentElement, true);
    while (wrap.firstChild) {
      wrap.removeChild(wrap.firstChild);
    }
    wrap.appendChild(svgEl);
  }

  async function init() {
    requireConnectionCore();
    if (location.protocol === 'file:') {
      setStatus('פתחי דרך http://localhost:8080/prototype.html (python3 server.py)');
      document.getElementById('createBtn').disabled = true;
      return;
    }
    try {
      await loadGlyphManifest();
      await loadConnections();
      appReady = true;
      setStatus('מוכן — ' + glyphLetters.length + ' גליפים, ' + connections.length + ' חיבורים');
    } catch (err) {
      appReady = false;
      setStatus('שגיאת טעינה: ' + err.message);
      document.getElementById('createBtn').disabled = true;
      console.error(err);
    }
  }

  async function composeAmulet() {
    console.log('compose called');
    if (composeBusy) return;
    if (!appReady) {
      setStatus('המערכת עדיין טוענת — המתיני רגע');
      return;
    }
    readParams();
    const sentence = document.getElementById('sentence').value.trim();
    let letters = sentence ? getFirstLetters(sentence) : [];
    if (!letters.length && lastComposeLetters.length) {
      letters = lastComposeLetters.slice();
    }
    if (!letters.length) {
      setStatus(sentence ? 'לא נמצאו אותיות עבריות' : 'כתבי משפט כוונה');
      return;
    }

    const btn = document.getElementById('createBtn');
    composeBusy = true;
    btn.disabled = true;
    setStatus('בונה קמע…');

    try {
      const { svg, placements, anchor, skipped, style } = await buildAmuletSvg(letters);
      lastComposeLetters = letters.slice();
      console.log('[prototype] compose —', {
        amuletType: params.amuletType,
        domain: params.domain,
        age: params.age,
        gender: params.gender,
        urgency: params.urgency,
        strokeColor: style.strokeColor,
        ageTexture: style.ageTexture,
        surfaceScale: style.surfaceScale,
        spikeCount: style.spikeCount,
        spikeLength: style.spikeLength,
        linecap: style.linecap,
        linejoin: style.linejoin,
        miterlimit: style.miterlimit,
        effect: effectLabel(style),
        spacing: style.spacing
      });
      setResultSvg(svg);

      showDebug(placements, anchor, style);
      let msg = 'אותיות: ' + letters.join(' → ') + ' | מרכז: ' + anchor;
      msg += ' | ' + style.amuletType + ' · ' + style.domainKey;
      msg += ' | cap=' + style.linecap + '/' + style.linejoin;
      msg += ' | age=' + style.ageTexture + ' spikes=' + style.spikeCount;
      msg += ' | fx=' + effectLabel(style);
      msg += ' | spacing=' + style.spacing.toFixed(2);
      msg += ' | קנה×' + style.amuletScale.toFixed(2);
      if (skipped.length) msg += ' | ללא חיבור: ' + skipped.join(' ');
      setStatus(msg);
    } catch (err) {
      setStatus('שגיאה: ' + err.message);
      console.error(err);
    } finally {
      composeBusy = false;
      btn.disabled = false;
    }
  }

  document.getElementById('createBtn').addEventListener('click', composeAmulet);

  init();
})();

  window.onerror = function (msg, src, line) {
    document.body.innerHTML +=
      '<p style="color:red">' + msg + ' line:' + line + '</p>';
  };
  </script>
</body>
</html>
