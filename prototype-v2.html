<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>אב-טיפוס קמע — Prototype v2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, "Segoe UI", sans-serif;
      background: #ececec;
      color: #222;
      font-size: 14px;
      line-height: 1.5;
    }
    header {
      background: #1a1a1a;
      color: #eee;
      padding: 14px 20px;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header p { font-size: 0.8rem; color: #aaa; margin-top: 4px; }
    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 380px) 1fr;
      gap: 0;
      min-height: calc(100vh - 56px);
    }
    .layout > main.preview { min-width: 0; }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }
    .panel {
      background: #f8f8f8;
      border-left: 1px solid #ccc;
      padding: 16px 18px;
      overflow-y: auto;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .opt-btn {
      padding: 6px 10px;
      border: 1px solid #bbb;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: inherit;
      color: #333;
      transition: background 0.1s, border-color 0.1s;
    }
    .opt-btn:hover { background: #efefef; }
    .opt-btn.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }
    #sentence,
    #personName {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #bbb;
      border-radius: 4px;
      font-size: 1rem;
      font-family: inherit;
    }
    #createBtn {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      background: #2a5;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    #createBtn:hover { background: #248a42; }
    #createBtn:disabled { opacity: 0.5; cursor: default; }
    .preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px;
      background: #e8e8e8;
      gap: 12px;
    }
    #amuletContainer {
      background: #fff;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
      width: min(680px, 100%);
    }
    #amuletContainer svg,
    #amuletContainer canvas { display: block; max-width: 100%; height: auto; }
    #status {
      font-size: 0.85rem;
      color: #444;
      text-align: center;
      max-width: 680px;
    }
    #debugList {
      font-family: monospace, "Courier New", Courier, monospace;
      font-size: 11px;
      direction: ltr;
      text-align: left;
      background: #fff;
      color: #222;
      border: 1px dashed #999;
      padding: 8px 12px;
      min-width: 220px;
    }
    #debugList ul { margin: 4px 0 0; padding: 0; list-style: none; }
    .hint {
      font-size: 0.75rem;
      color: #888;
      margin-top: 12px;
    }
    .hint code { direction: ltr; unicode-bidi: embed; }
  </style>
</head>
<body>
  <header>
    <h1>אב-טיפוס v2 — שכבת שם + שכבת כוונה</h1>
    <p>שכבה 2: אותיות השם · שכבה 3: משפט כוונה · glyphs/ + connections.json</p>
  </header>

  <div class="layout">
    <aside class="panel">
      <div class="field" data-group="amuletType">
        <label>סוג קמע</label>
        <div class="btn-row">
          <button type="button" class="opt-btn active" data-value="protection">הגנה</button>
          <button type="button" class="opt-btn" data-value="summoning">זימון</button>
        </div>
      </div>

      <div class="field" data-group="domain">
        <label>תחום</label>
        <div class="btn-row">
          <button type="button" class="opt-btn active" data-value="love">אהבה</button>
          <button type="button" class="opt-btn" data-value="livelihood">פרנסה</button>
          <button type="button" class="opt-btn" data-value="health">בריאות</button>
          <button type="button" class="opt-btn" data-value="family">משפחה</button>
          <button type="button" class="opt-btn" data-value="selfConfidence">ביטחון עצמי</button>
          <button type="button" class="opt-btn" data-value="meaning">משמעות וזהות</button>
          <button type="button" class="opt-btn" data-value="housing">מגורים</button>
        </div>
      </div>

      <div class="field">
        <label for="ageInput">גיל</label>
        <input type="number" id="ageInput" min="1" max="120" value="25" placeholder="גיל" style="width:80px; font-size:16px; text-align:center; padding:8px;">
      </div>

      <div class="field" data-group="gender">
        <label>מגדר</label>
        <div class="btn-row">
          <button type="button" class="opt-btn active" data-value="female">נקבה</button>
          <button type="button" class="opt-btn" data-value="nonbinary">לא בינארי</button>
          <button type="button" class="opt-btn" data-value="male">זכר</button>
        </div>
      </div>

      <div class="field" data-group="urgency">
        <label>דחיפות</label>
        <div class="btn-row">
          <button type="button" class="opt-btn" data-value="far">עתיד רחוק</button>
          <button type="button" class="opt-btn" data-value="year">שנה הקרובה</button>
          <button type="button" class="opt-btn" data-value="month">חודש הקרוב</button>
          <button type="button" class="opt-btn active" data-value="now">עכשיו</button>
        </div>
      </div>

      <div class="field">
        <label for="personName">שם</label>
        <input id="personName" type="text" placeholder="לדוגמה: הילה" value="הילה">
      </div>

      <div class="field" data-group="familyStatus">
        <label>סטטוס משפחתי</label>
        <div class="btn-row">
          <button type="button" class="opt-btn active" data-value="single">רווק/ה</button>
          <button type="button" class="opt-btn" data-value="couple">זוגיות</button>
          <button type="button" class="opt-btn" data-value="married">נשוי/אה</button>
          <button type="button" class="opt-btn" data-value="divorced">גרוש/ה</button>
          <button type="button" class="opt-btn" data-value="widowed">אלמן/ה</button>
        </div>
      </div>

      <div class="field" data-group="occupation">
        <label>עיסוק</label>
        <div class="btn-row">
          <button type="button" class="opt-btn active" data-value="humanities">הומני</button>
          <button type="button" class="opt-btn" data-value="technical">טכני</button>
          <button type="button" class="opt-btn" data-value="creative">יצירתי</button>
          <button type="button" class="opt-btn" data-value="security">ביטחון</button>
          <button type="button" class="opt-btn" data-value="student">סטודנט</button>
        </div>
      </div>

      <div class="field" data-group="mood">
        <label>מצב רוח</label>
        <div class="btn-row">
          <button type="button" class="opt-btn active" data-value="joy">שמחה</button>
          <button type="button" class="opt-btn" data-value="sadness">עצב</button>
          <button type="button" class="opt-btn" data-value="anxiety">חרדה</button>
          <button type="button" class="opt-btn" data-value="calm">רוגע</button>
          <button type="button" class="opt-btn" data-value="strength">כוח</button>
          <button type="button" class="opt-btn" data-value="love">אהבה</button>
        </div>
      </div>

      <div class="field">
        <label for="sentence">משפט כוונה</label>
        <input id="sentence" type="text" placeholder="לדוגמה: בית גדול בתאילנד אמן" value="בית גדול בתאילנד אמן">
      </div>

      <button type="button" id="createBtn">צור קמע</button>

      <p class="hint">שכבה 2: שם + סטטוס + עיסוק + מצב רוח (×1.25) · שכבה 3: כוונה + תחום + גיל + מגדר + דחיפות<br>
        פתחי דרך <code>http://localhost:8080/prototype-v2.html</code></p>
    </aside>

    <main class="preview">
      <div id="amuletContainer">
        <svg id="resultSvg" width="680" height="680" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
          <rect width="680" height="680" fill="#ffffff"/>
          <text x="340" y="340" text-anchor="middle" fill="#bbb" font-family="monospace" font-size="14">לחצי «צור קמע»</text>
        </svg>
      </div>
      <p id="status">—</p>
      <div id="debugList" hidden></div>
    </main>
  </div>

  <script src="connection-core.js"></script>
  <script>
(function () {
  'use strict';

  /* --- Canvas --- */
  const HEB = 'אבגדהוזחטיכלמנסעפצקרשת'.split('');
  const W = 680;
  const H = 680;
  const CX = 340;
  const CY = 340;
  const GLYPHS_DIR = 'glyphs';
  const MAX_LETTERS = 8;
  const HUB_OVERLAP_DIST = 80;
  const DEFAULT_GLYPH_SIZE = 150;
  /** Normalized path stroke in glyph viewBox units (matches א1.svg, ב2.svg, etc.) */
  const GLYPH_PATH_STROKE_WIDTH = 46;

  const BG_WHITE = '#ffffff';
  const VIEWBOX_PAD = 45;
  const FILTER_ID_COMBINED = 'combined';
  const FILTER_ID_LAYER2 = 'combined-layer2';
  const FILTER_ID_LAYER3 = 'combined-layer3';
  /** שכבה 2 (שם) — מעט קטנה יותר מהקדמית, ממורכזת מאחור */
  const LAYER2_SCALE = 0.91125;

  function ageToSurfaceScale(age) {
    const a = Math.max(1, Math.min(120, Number(age) || 25));
    return Math.round((a / 120) * 20);
  }

  /** תחום → צבע מעבר Pass 2 */
  const DOMAINS = {
    love: { stroke: '#D7A2B4' },
    livelihood: { stroke: '#C8ED14' },
    health: { stroke: '#cccccc' },
    family: { stroke: '#6D6455' },
    selfConfidence: { stroke: '#362514' },
    meaning: { stroke: '#6C3711' },
    housing: { stroke: '#8B7355' }
  };

  const GENDER_SCALE_FEMALE = 1.08;
  const GENDER_SCALE_MALE = 1.0;
  const GENDER_SCALE_NONBINARY = 1.03;

  const GENDER_VISUAL = {
    female: {
      linecap: 'round',
      linejoin: 'round',
      miterlimit: null,
      scale: GENDER_SCALE_FEMALE
    },
    nonbinary: {
      linecap: 'round',
      linejoin: 'round',
      miterlimit: null,
      scale: GENDER_SCALE_NONBINARY
    },
    male: {
      linecap: 'square',
      linejoin: 'miter',
      miterlimit: 1,
      scale: GENDER_SCALE_MALE
    }
  };

  /* --- Spacing (distance from center; dramatic range) --- */
  const URGENCY_SPACING = {
    far: 1.8,
    year: 1.45,
    month: 1.15,
    now: 0.5
  };

  /** שכבה 2 — מרווח עדין לפי סטטוס (טווח צר כמו דחיפות — הקמע נשאר צורה אחת) */
  const STATUS_SPACING = {
    married: 0.55,
    couple: 0.72,
    widowed: 0.88,
    single: 1.0,
    divorced: 1.2
  };

  /** שכבה 2 — צבע קו לפי מצב רוח */
  const MOOD_STROKE = {
    joy: '#F5C842',
    sadness: '#6B7FD4',
    anxiety: '#E8773A',
    calm: '#5BAD8F',
    strength: '#8B2635',
    love: '#D4748C'
  };

  /** שכבה 2 — סגנון קו + טקסטורת גימור לפי עיסוק */
  const OCCUPATION_VISUAL = {
    humanities: {
      linecap: 'round',
      linejoin: 'round',
      miterlimit: null,
      customBump: null
    },
    technical: {
      linecap: 'square',
      linejoin: 'miter',
      miterlimit: 1,
      customBump: { type: 'fractalNoise', baseFrequency: '0.1', numOctaves: 2, scaleFactor: 0.85 }
    },
    creative: {
      linecap: 'round',
      linejoin: 'round',
      miterlimit: null,
      customBump: { type: 'fractalNoise', baseFrequency: '0.06', numOctaves: 4, scaleFactor: 1.15 }
    },
    security: {
      linecap: 'square',
      linejoin: 'miter',
      miterlimit: 1,
      customBump: { type: 'turbulence', baseFrequency: '0.11', numOctaves: 3, scaleFactor: 1.4 }
    },
    student: {
      linecap: 'round',
      linejoin: 'round',
      miterlimit: null,
      customBump: { type: 'fractalNoise', baseFrequency: '0.12', numOctaves: 3, scaleFactor: 1.75 }
    }
  };

  /* --- Intent keys (match connections.json) --- */
  const INTENT_TYPES = ['protection', 'summoning', 'grounding'];

  const BUILTIN_SYMBOLS = {
    circle: { viewBox: '0 0 100 100' },
    triangle: { viewBox: '0 0 100 100' },
    arc: { viewBox: '0 0 100 100' },
    dot: { viewBox: '0 0 100 100' }
  };

  let glyphLetters = [];
  const glyphSvgCache = {};
  const parsedGlyphCache = {};
  let connections = [];

  const params = {
    amuletType: 'protection',
    domain: 'love',
    age: 25,
    gender: 'female',
    urgency: 'now',
    familyStatus: 'single',
    occupation: 'humanities',
    mood: 'joy',
    personName: ''
  };

  function clampNum(n, min, max) {
    return Math.max(min, Math.min(max, n));
  }

  function getGroupValue(group) {
    const btn = document.querySelector('.field[data-group="' + group + '"] .opt-btn.active');
    return btn ? btn.dataset.value : null;
  }

  function readParams() {
    params.amuletType = getGroupValue('amuletType') || 'protection';
    params.domain = getGroupValue('domain') || 'love';
    params.age = Math.max(1, Math.min(120, Number(document.getElementById('ageInput').value) || 25));
    params.gender = getGroupValue('gender') || 'female';
    params.urgency = getGroupValue('urgency') || 'now';
    params.familyStatus = getGroupValue('familyStatus') || 'single';
    params.occupation = getGroupValue('occupation') || 'humanities';
    params.mood = getGroupValue('mood') || 'joy';
    params.personName = (document.getElementById('personName').value || '').trim();
    return params;
  }

  function getStatusSpacing(familyStatus) {
    const key = familyStatus || 'single';
    return STATUS_SPACING[key] != null ? STATUS_SPACING[key] : STATUS_SPACING.single;
  }

  function parseHexColor(hex) {
    const h = (hex || '#000000').replace('#', '');
    return {
      r: parseInt(h.slice(0, 2), 16),
      g: parseInt(h.slice(2, 4), 16),
      b: parseInt(h.slice(4, 6), 16)
    };
  }

  function mixHexColor(a, b, t) {
    const ca = parseHexColor(a);
    const cb = parseHexColor(b);
    const mix = (x, y) => Math.round(x + (y - x) * t);
    const r = mix(ca.r, cb.r);
    const g = mix(ca.g, cb.g);
    const bl = mix(ca.b, cb.b);
    return (
      '#' +
      r.toString(16).padStart(2, '0') +
      g.toString(16).padStart(2, '0') +
      bl.toString(16).padStart(2, '0')
    );
  }

  function visualStyleLayer3(p) {
    const strokeByDomain = {
      love: '#D7A2B4',
      livelihood: '#C8ED14',
      health: '#cccccc',
      family: '#6D6455',
      selfConfidence: '#362514',
      meaning: '#6C3711',
      housing: '#8B7355'
    };
    const spacing = URGENCY_SPACING[p.urgency] ?? 1.0;
    const gender = GENDER_VISUAL[p.gender] || GENDER_VISUAL.female;
    const intent = p.amuletType === 'summoning' ? 'summoning' : 'protection';
    const domainColor = strokeByDomain[p.domain] || strokeByDomain.love;
    const strokeColor = mixHexColor(domainColor, '#ffffff', 0.6);

    const surfaceScale = ageToSurfaceScale(p.age);
    const ageTexture = surfaceScale <= 0 ? 'gloss' : surfaceScale < 9 ? 'gloss+bump' : 'gloss+rough';

    return {
      layer: 3,
      amuletType: p.amuletType,
      domainKey: p.domain,
      intent,
      strokeColor,
      strokeOpacity: 1,
      layerOpacity: 0.85,
      spacing,
      amuletScale: gender.scale,
      linecap: gender.linecap,
      linejoin: gender.linejoin,
      miterlimit: gender.miterlimit,
      ageTexture,
      surfaceScale,
      age: p.age,
      gender: p.gender,
      filterId: FILTER_ID_LAYER3
    };
  }

  /** שכבה 2 — שם: מרווח לפי סטטוס, קו/מרקם לפי עיסוק, צבע לפי מצב רוח */
  function visualStyleLayer2(p) {
    const gender = GENDER_VISUAL[p.gender] || GENDER_VISUAL.female;
    const occ = OCCUPATION_VISUAL[p.occupation] || OCCUPATION_VISUAL.humanities;
    const surfaceScale = ageToSurfaceScale(p.age);
    const ageTexture = surfaceScale <= 0 ? 'gloss' : surfaceScale < 9 ? 'gloss+bump' : 'gloss+rough';
    const statusSpacing = getStatusSpacing(p.familyStatus);
    const moodKey = p.mood || 'joy';

    return {
      layer: 2,
      familyStatus: p.familyStatus,
      occupationKey: p.occupation,
      moodKey,
      intent: 'protection',
      strokeColor: '#c0c0c0',
      strokeOpacity: 1,
      spacing: statusSpacing,
      amuletScale: gender.scale * LAYER2_SCALE,
      linecap: occ.linecap,
      linejoin: occ.linejoin,
      miterlimit: occ.miterlimit,
      customBump: occ.customBump,
      ageTexture,
      surfaceScale,
      age: p.age,
      gender: p.gender,
      filterId: FILTER_ID_LAYER2
    };
  }

  /** זכר: קוצניות מינימלית 8 + חספוס גיל רציף */
  function maleBumpProfile(age) {
    const a = Math.max(1, Math.min(120, Number(age) || 25));
    const scale = Math.max(8, ageToSurfaceScale(age));
    const baseFrequency = (0.08 + ((120 - a) / 120) * 0.07).toFixed(3);
    const numOctaves = a < 18 ? 1 : 2;
    return { scale, baseFrequency, numOctaves };
  }

  /** גיל = עוצמת חספוס. זכר: turbulence — הקוצים נובעים מדפוס ה-displacement על הצורה. */
  function ageBumpByGender(style) {
    const s = style.surfaceScale;
    if (style.customBump) {
      const cb = style.customBump;
      return {
        type: cb.type,
        baseFrequency: cb.baseFrequency,
        numOctaves: cb.numOctaves,
        scale: Math.max(0, Math.round(s * (cb.scaleFactor || 1)))
      };
    }
    const g = style.gender || 'female';
    if (g === 'male') {
      const profile = maleBumpProfile(style.age);
      return {
        type: 'turbulence',
        baseFrequency: profile.baseFrequency,
        numOctaves: profile.numOctaves,
        scale: profile.scale
      };
    }
    if (g === 'nonbinary') {
      return {
        type: 'fractalNoise',
        baseFrequency: '0.07',
        numOctaves: 3,
        scale: Math.round(s * 1.35)
      };
    }
    return {
      type: 'fractalNoise',
      baseFrequency: '0.09',
      numOctaves: 2,
      scale: s
    };
  }

  function filterRegionAttrs(surfaceScale, bumpScale) {
    const s = bumpScale != null ? bumpScale : surfaceScale || 0;
    if (s > 12) return ' x="-30%" y="-30%" width="160%" height="160%"';
    if (s > 6) return ' x="-22%" y="-22%" width="144%" height="144%"';
    return ' x="-15%" y="-15%" width="130%" height="130%"';
  }

  function buildBumpDisplacement(bump, inName, resultName) {
    return (
      '<feTurbulence type="' +
      bump.type +
      '" baseFrequency="' +
      bump.baseFrequency +
      '" numOctaves="' +
      bump.numOctaves +
      '" seed="2" result="noise"/>' +
      '<feDisplacementMap in="' +
      inName +
      '" in2="noise" scale="' +
      bump.scale +
      '" xChannelSelector="R" yChannelSelector="G" result="' +
      resultName +
      '"/>'
    );
  }

  /** מיזוג ברק על הצורה אחרי displacement (rough), לא על SourceGraphic המקורי */
  function buildGlossClipMergeOn(baseName) {
    return (
      '<feComposite in="gloss" in2="' +
      baseName +
      '" operator="in" result="glossClip"/>' +
      '<feMerge result="glossed">' +
      '<feMergeNode in="' +
      baseName +
      '"/>' +
      '<feMergeNode in="glossClip"/>' +
      '</feMerge>' +
      '<feComposite in="glossed" in2="' +
      baseName +
      '" operator="in"/>'
    );
  }

  /** שכבה 2 — כרום + חספוס/קוצים (מגדר/עיסוק) קודם, ואז ברק מתכתי */
  function buildChromeFilter(filterId, style) {
    const bump = ageBumpByGender(style);
    return (
      '<filter id="' +
      filterId +
      '"' +
      filterRegionAttrs(style.surfaceScale, bump.scale) +
      ' color-interpolation-filters="sRGB">' +
      buildBumpDisplacement(bump, 'SourceGraphic', 'rough') +
      '<feGaussianBlur in="rough" stdDeviation="2" result="blur"/>' +
      '<feSpecularLighting in="blur" surfaceScale="12" specularConstant="2" specularExponent="80" lighting-color="white" result="gloss">' +
      '<fePointLight x="200" y="100" z="150"/>' +
      '</feSpecularLighting>' +
      buildGlossClipMergeOn('rough') +
      '</filter>'
    );
  }

  /** שכבה 3 — זכוכית חלבית + חספוס גיל קודם, ואז ברק רך */
  function buildMilkyGlassFilter(filterId, style) {
    const bump = ageBumpByGender(style);
    return (
      '<filter id="' +
      filterId +
      '"' +
      filterRegionAttrs(style.surfaceScale, bump.scale) +
      ' color-interpolation-filters="sRGB">' +
      buildBumpDisplacement(bump, 'SourceGraphic', 'rough') +
      '<feGaussianBlur in="rough" stdDeviation="1" result="blur"/>' +
      '<feSpecularLighting in="blur" surfaceScale="6" specularConstant="0.8" specularExponent="20" lighting-color="white" result="gloss">' +
      '<fePointLight x="300" y="150" z="200"/>' +
      '</feSpecularLighting>' +
      buildGlossClipMergeOn('rough') +
      '</filter>'
    );
  }

  function buildSvgDefs(style2, style3) {
    let defs = '<defs>';
    if (style2) {
      console.log('[layer2] chrome · occupation:', style2.occupationKey);
      defs += buildChromeFilter(FILTER_ID_LAYER2, style2);
    }
    console.log('[layer3] milky glass · domain:', style3.domainKey);
    defs += buildMilkyGlassFilter(FILTER_ID_LAYER3, style3);
    defs += '</defs>';
    return defs;
  }

  function assembleAmuletSvg(vb, defs, content) {
    return (
      '<svg id="amuletSvg" xmlns="http://www.w3.org/2000/svg" width="' +
      W +
      '" height="' +
      H +
      '" viewBox="' +
      vb.x +
      ' ' +
      vb.y +
      ' ' +
      vb.w +
      ' ' +
      vb.h +
      '" preserveAspectRatio="xMidYMid meet">' +
      defs +
      '<rect x="' +
      vb.x +
      '" y="' +
      vb.y +
      '" width="' +
      vb.w +
      '" height="' +
      vb.h +
      '" fill="' +
      BG_WHITE +
      '"/>' +
      content +
      '</svg>'
    );
  }

  function requireConnectionCore() {
    if (!window.ConnectionCore) {
      throw new Error('connection-core.js לא נטען — רענני את הדף');
    }
    return window.ConnectionCore;
  }

  function effectLabel(style) {
    const tex = style.ageTexture !== 'none' ? style.ageTexture : 'neutral';
    const bump = ageBumpByGender(style);
    let fx =
      bump.type +
      '@' +
      bump.baseFrequency +
      '×' +
      bump.scale;
    if (style.gender === 'male') {
      fx += ' spiky-bump';
    }
    return style.amuletType + '/' + style.domainKey + ' · ' + tex + ' · ' + fx + ' · ' + style.linecap;
  }

  /**
   * Normalize path stroke-width; stroke color/filter come from the unified stroke pass.
   */
  function sanitizePathsInner(html) {
    if (!html) return '';
    const sw = String(GLYPH_PATH_STROKE_WIDTH);
    try {
      const doc = new DOMParser().parseFromString(
        '<svg xmlns="http://www.w3.org/2000/svg"><g id="root">' + html + '</g></svg>',
        'image/svg+xml'
      );
      if (doc.querySelector('parsererror')) return html;
      doc.querySelectorAll('path,circle,ellipse,line,polyline,polygon').forEach((el) => {
        el.setAttribute('fill', 'none');
        el.removeAttribute('stroke');
        el.setAttribute('stroke-width', sw);
        el.removeAttribute('stroke-linecap');
        el.removeAttribute('stroke-linejoin');
        el.removeAttribute('stroke-opacity');
        if (el.hasAttribute('style')) {
          const s = el
            .getAttribute('style')
            .replace(/fill\s*:\s*[^;]+;?/gi, 'fill:none;')
            .replace(/stroke\s*:\s*[^;]+;?/gi, '')
            .replace(/stroke-width\s*:\s*[^;]+;?/gi, 'stroke-width:' + sw + ';');
          el.setAttribute('style', s);
        }
      });
      const root = doc.getElementById('root');
      return root ? root.innerHTML : html;
    } catch (_) {
      return html
        .replace(/\sstroke\s*=\s*["'][^"']*["']/gi, '')
        .replace(/\sstroke-width\s*=\s*["'][^"']*["']/gi, ' stroke-width="' + sw + '"')
        .replace(/fill\s*=\s*["'](?!none)[^"']*["']/gi, 'fill="none"');
    }
  }

  function strokeAttrs(style, width, filterId) {
    let attrs =
      'fill="none" stroke="' +
      style.strokeColor +
      '" stroke-width="' +
      width +
      '" stroke-linecap="' +
      style.linecap +
      '" stroke-linejoin="' +
      style.linejoin +
      '"';
    if (style.strokeOpacity != null && style.strokeOpacity < 1) {
      attrs += ' stroke-opacity="' + style.strokeOpacity + '"';
    }
    if (style.miterlimit != null) {
      attrs += ' stroke-miterlimit="' + style.miterlimit + '"';
    }
    if (filterId) {
      attrs += ' filter="url(#' + filterId + ')"';
    }
    return attrs;
  }

  function pathLayers(pathMarkup, style, filterId) {
    const clean = sanitizePathsInner(pathMarkup);
    const mainFid = filterId || style.filterId || FILTER_ID_COMBINED;
    return (
      '<g class="path-layers"><g class="path-main" ' +
      strokeAttrs(style, 45, mainFid) +
      '>' +
      clean +
      '</g></g>'
    );
  }

  /** Bounding box for mirrored symmetric layout (includes stroke padding). */
  function viewBoxForPlacements(placements, surfaceScale) {
    let minX = Infinity;
    let maxX = -Infinity;
    let minY = Infinity;
    let maxY = -Infinity;
    const extraPad = Math.min((surfaceScale || 0) * 2.5, 60);
    const bump = (x, y) => {
      minX = Math.min(minX, x);
      maxX = Math.max(maxX, x);
      minY = Math.min(minY, y);
      maxY = Math.max(maxY, y);
    };
    for (const p of placements) {
      const r = p.sz / 2 + VIEWBOX_PAD + extraPad;
      bump(p.x - r, p.y - r);
      bump(p.x + r, p.y + r);
      const mx = W - p.x;
      bump(mx - r, p.y - r);
      bump(mx + r, p.y + r);
    }
    if (!isFinite(minX)) {
      return { x: 0, y: 0, w: W, h: H };
    }
    const bw = maxX - minX;
    const bh = maxY - minY;
    return {
      x: minX,
      y: minY,
      w: Math.max(bw, 120),
      h: Math.max(bh, 120)
    };
  }

  function wrapAmuletScale(content, style) {
    if (style.amuletScale === 1) return content;
    return (
      '<g transform="translate(' +
      CX +
      ',' +
      CY +
      ') scale(' +
      style.amuletScale +
      ') translate(' +
      -CX +
      ',' +
      -CY +
      ')">' +
      content +
      '</g>'
    );
  }

  let composeBusy = false;
  let appReady = false;
  let lastComposeLetters = [];

  document.querySelectorAll('.field[data-group]').forEach((field) => {
    field.querySelectorAll('.opt-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        field.querySelectorAll('.opt-btn').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        readParams();
        composeAmulet();
      });
    });
  });

  function glyphFilename(letter) {
    return letter === 'א' ? 'א1.svg' : letter + '2.svg';
  }

  function letterFromFilename(file) {
    const base = file.replace(/\.svg$/i, '');
    if (base === 'א1') return 'א';
    const m = base.match(/^(.)(?:1|2)$/);
    return m && HEB.includes(m[1]) ? m[1] : null;
  }

  async function loadGlyphManifest() {
    const res = await fetch(GLYPHS_DIR + '/manifest.json');
    if (!res.ok) throw new Error('manifest.json לא נטען');
    const data = await res.json();
    const files = data.files || [];
    glyphLetters = [];
    for (const f of files) {
      const ch = letterFromFilename(f);
      if (ch && !glyphLetters.includes(ch)) glyphLetters.push(ch);
    }
    if (!glyphLetters.length) glyphLetters = HEB.slice();
  }

  async function loadConnections() {
    try {
      const api = await fetch('/api/connections?t=' + Date.now(), { cache: 'no-store' });
      if (api.ok) {
        const data = await api.json();
        connections = data.connections || [];
        return;
      }
    } catch (_) { /* fallback */ }
    const res = await fetch('connections.json?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('connections.json לא נטען');
    const data = await res.json();
    connections = data.connections || [];
  }

  function getFirstLetters(str) {
    const avail = new Set(glyphLetters.length ? glyphLetters : HEB);
    const used = new Set();
    const out = [];
    for (const word of str.split(/\s+/).filter((w) => w.length > 0)) {
      if (out.length >= MAX_LETTERS) break;
      let picked = null;
      for (let i = 0; i < word.length; i++) {
        const ch = word[i];
        if (!avail.has(ch) || used.has(ch)) continue;
        picked = ch;
        break;
      }
      if (picked) {
        used.add(picked);
        out.push(picked);
      }
    }
    return out;
  }

  /** אותיות עבריות מהשם — ללא כפילויות, עד MAX_LETTERS */
  function lettersFromName(name) {
    const avail = new Set(glyphLetters.length ? glyphLetters : HEB);
    const used = new Set();
    const out = [];
    for (const ch of String(name || '').replace(/\s/g, '')) {
      if (out.length >= MAX_LETTERS) break;
      if (!avail.has(ch) || used.has(ch)) continue;
      used.add(ch);
      out.push(ch);
    }
    return out;
  }

  async function loadGlyphSvg(letter) {
    const url =
      GLYPHS_DIR + '/' + encodeURIComponent(glyphFilename(letter)) + '?t=' + Date.now();
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error('חסר SVG: ' + letter);
    const text = await res.text();
    glyphSvgCache[letter] = text;
    delete parsedGlyphCache[letter];
    return text;
  }

  function parseGlyphSvg(svgText) {
    const clean = svgText.trim().replace(/^<\?xml[^>]*>\s*/i, '').replace(/^<!DOCTYPE[^>]*>\s*/i, '');
    const doc = new DOMParser().parseFromString(clean, 'image/svg+xml');
    if (doc.querySelector('parsererror')) throw new Error('SVG לא תקין');
    const el = doc.querySelector('svg');
    if (!el) throw new Error('אין svg');
    const vb = el.getAttribute('viewBox') || '0 0 100 100';
    const vbp = vb.trim().split(/[\s,]+/).map(Number);
    const vw = vbp[2] || 100;
    const vh = vbp[3] || 100;
    const raw = el.innerHTML;
    const inner = sanitizePathsInner(raw);
    return { inner, vw, vh, viewBox: el.getAttribute('viewBox') || '0 0 ' + vw + ' ' + vh };
  }

  async function getParsedGlyph(letter) {
    const parsed = parseGlyphSvg(await loadGlyphSvg(letter));
    parsedGlyphCache[letter] = parsed;
    return parsed;
  }

  function hubPositionOverlaps(x, y, byLetter, skipLetter) {
    for (const [, pl] of byLetter) {
      if (pl.letter === skipLetter) continue;
      if (Math.hypot(x - pl.x, y - pl.y) < HUB_OVERLAP_DIST) return true;
    }
    return false;
  }

  function hubCandidatesForLetter(letter, anchor, byLetter, intent, CC) {
    const candidates = [];
    const anchorPl = byLetter.get(anchor);
    const anchorConn = CC.findConnectionBetween(connections, anchor, letter, intent);
    if (anchorConn) {
      const pos = CC.placementRelativeTo(anchorConn, anchor, letter, anchorPl.x, anchorPl.y);
      if (pos) candidates.push({ pos, viaAnchor: true });
    }
    for (const [ref, refPl] of byLetter) {
      if (ref === anchor) continue;
      const conn = CC.findConnectionBetween(connections, ref, letter, intent);
      if (!conn) continue;
      const pos = CC.placementRelativeTo(conn, ref, letter, refPl.x, refPl.y);
      if (pos) candidates.push({ pos, viaAnchor: false });
    }
    return candidates;
  }

  function pickHubPlacement(candidates, byLetter, letter) {
    const viaAnchor = candidates.find((c) => c.viaAnchor);
    if (viaAnchor && !hubPositionOverlaps(viaAnchor.pos.x, viaAnchor.pos.y, byLetter, letter)) {
      return viaAnchor.pos;
    }
    for (const c of candidates) {
      if (c.viaAnchor) continue;
      if (!hubPositionOverlaps(c.pos.x, c.pos.y, byLetter, letter)) return c.pos;
    }
    if (viaAnchor) return viaAnchor.pos;
    return candidates.length ? candidates[0].pos : null;
  }

  function buildHubPlacements(letters, intent) {
    const CC = requireConnectionCore();
    const anchor = CC.pickHubAnchor(letters, connections, intent);
    const defaultSz = CC.CANVAS.DEFAULT_SIZE;
    const byLetter = new Map();
    byLetter.set(anchor, {
      letter: anchor,
      x: CX,
      y: CY,
      rotation: 0,
      sz: defaultSz,
      flipX: false,
      flipY: false
    });

    const usedPairs = [];
    const skipped = [];
    for (const letter of letters.filter((ch) => ch !== anchor)) {
      const candidates = hubCandidatesForLetter(letter, anchor, byLetter, intent, CC);
      const pos = pickHubPlacement(candidates, byLetter, letter);
      if (!pos) {
        skipped.push(letter);
        continue;
      }
      byLetter.set(letter, {
        letter: pos.letter,
        x: pos.x,
        y: pos.y,
        rotation: pos.rotation,
        sz: pos.sz,
        flipX: pos.flipX,
        flipY: pos.flipY
      });
      usedPairs.push(pos.pair);
    }

    const placements = [byLetter.get(anchor)];
    for (const ch of letters) {
      if (ch !== anchor && byLetter.has(ch)) placements.push(byLetter.get(ch));
    }
    return { placements, anchor, usedPairs, skipped, byLetter };
  }

  /** מרווח אותיות מהמרכז — זהה לדחיפות בשכבה 3 (prototype.html) */
  function applySpacingToPlacements(placements, anchor, factor) {
    return placements.map((p) => {
      if (p.letter === anchor) return p;
      return {
        ...p,
        x: CX + (p.x - CX) * factor,
        y: CY + (p.y - CY) * factor
      };
    });
  }

  function getRawConnection(from, to, intent) {
    const matches = connections.filter((c) => c.from === from && c.to === to && c.intent === intent);
    return matches.length ? matches[matches.length - 1] : null;
  }

  function collectConnectionSymbols(usedPairs, intent, byLetter) {
    const CC = requireConnectionCore();
    const out = [];
    const seen = new Set();
    for (const pair of usedPairs) {
      const key = pair.from + '\u2192' + pair.to;
      if (seen.has(key)) continue;
      seen.add(key);
      const raw = getRawConnection(pair.from, pair.to, intent);
      if (!raw?.symbols?.length) continue;
      const norm = CC.normalizeConnection(raw);
      const refPl = byLetter.get(pair.from);
      if (!norm || !refPl) {
        out.push(...raw.symbols);
        continue;
      }
      const ox = norm.fromGlyph.x;
      const oy = norm.fromGlyph.y;
      for (const sym of raw.symbols) {
        out.push({
          ...sym,
          x: refPl.x + (Number(sym.x) - ox),
          y: refPl.y + (Number(sym.y) - oy)
        });
      }
    }
    return out;
  }

  function buildArcPath(cx, cy, r, spanDeg) {
    const span = clampNum(spanDeg, 30, 330);
    const half = (span / 2) * (Math.PI / 180);
    const x1 = cx + r * Math.cos(Math.PI + half);
    const y1 = cy + r * Math.sin(Math.PI + half);
    const x2 = cx + r * Math.cos(Math.PI - half);
    const y2 = cy + r * Math.sin(Math.PI - half);
    const large = span > 180 ? 1 : 0;
    return 'M' + x1.toFixed(2) + ' ' + y1.toFixed(2) + ' A' + r + ' ' + r + ' 0 ' + large + ' 1 ' + x2.toFixed(2) + ' ' + y2.toFixed(2);
  }

  function buildSymbolInner(sym) {
    const t = sym.type;
    if (t === 'circle') return '<circle cx="50" cy="50" r="40"/>';
    if (t === 'dot') return '<circle cx="50" cy="50" r="14"/>';
    if (t === 'triangle') {
      const ratio = clampNum(sym.triangleRatio || 1, 0.5, 2);
      return '<g transform="translate(50 50) scale(' + ratio.toFixed(3) + ' 1) translate(-50 -50)"><path d="M50 12 L88 88 L12 88 Z"/></g>';
    }
    if (t === 'arc') return '<path d="' + buildArcPath(50, 52, 38, sym.arcAngle || 180) + '"/>';
    return '';
  }

  function symbolGroupMarkup(sym, style, filterId) {
    if (!BUILTIN_SYMBOLS[sym.type]) return '';
    const size = Number(sym.size) || 64;
    const inner = buildSymbolInner(sym);
    const rot = Number(sym.rotation) || 0;
    const fx = sym.flipX ? -1 : 1;
    const fy = sym.flipY ? -1 : 1;
    const vb = BUILTIN_SYMBOLS[sym.type].viewBox.trim().split(/[\s,]+/).map(Number);
    const vw = vb[2] || 100;
    const vh = vb[3] || 100;
    const half = size / 2;
    return (
      '<g class="amulet-symbol">' +
      '<g transform="translate(' +
      sym.x.toFixed(2) +
      ',' +
      sym.y.toFixed(2) +
      ') rotate(' +
      rot.toFixed(2) +
      ') scale(' +
      fx +
      ',' +
      fy +
      ') translate(' +
      (-half).toFixed(2) +
      ',' +
      (-half).toFixed(2) +
      ')">' +
      '<svg width="' +
      size +
      '" height="' +
      size +
      '" viewBox="0 0 ' +
      vw +
      ' ' +
      vh +
      '" preserveAspectRatio="xMidYMid meet" overflow="visible">' +
      pathLayers(inner, style, filterId) +
      '</svg></g></g>'
    );
  }

  /** Positioned glyph paths only (no per-glyph strokes) for unified group rendering. */
  function glyphPathsMarkup(placement, glyph) {
    const vb = glyph.viewBox || '0 0 ' + (glyph.vw || 100) + ' ' + (glyph.vh || 100);
    const vbp = vb.trim().split(/[\s,]+/).map(Number);
    const vw = vbp[2] || 100;
    const vh = vbp[3] || 100;
    const fx = placement.flipX ? -1 : 1;
    const fy = placement.flipY ? -1 : 1;
    const half = placement.sz / 2;
    const rot = Number(placement.rotation) || 0;
    const scaleX = ((placement.sz / vw) * fx).toFixed(4);
    const scaleY = ((placement.sz / vh) * fy).toFixed(4);
    const clean = sanitizePathsInner(glyph.inner);
    return (
      '<g class="amulet-glyph amulet-glyph-' +
      placement.letter +
      '">' +
      '<g transform="translate(' +
      placement.x.toFixed(2) +
      ',' +
      placement.y.toFixed(2) +
      ') rotate(' +
      rot.toFixed(2) +
      ') translate(' +
      (-half).toFixed(2) +
      ',' +
      (-half).toFixed(2) +
      ') scale(' +
      scaleX +
      ',' +
      scaleY +
      ')">' +
      clean +
      '</g></g>'
    );
  }

  function buildUnifiedGlyphRendering(pathsMarkup, style, filterId) {
    if (!pathsMarkup) return '';
    return '<g class="amulet-glyphs">' + pathLayers(pathsMarkup, style, filterId) + '</g>';
  }

  /** הזזת שכבת שם למרכז הקנבס (ממוצע מיקומי האותיות הגלויות). */
  function centerLayerGroup(markup, placements) {
    if (!markup || !placements?.length) return markup;
    const n = placements.length;
    const meanX = placements.reduce((s, p) => s + p.x, 0) / n;
    const meanY = placements.reduce((s, p) => s + p.y, 0) / n;
    const dx = CX - meanX;
    const dy = CY - meanY;
    if (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5) return markup;
    return (
      '<g class="layer-centered" transform="translate(' +
      dx.toFixed(2) +
      ',' +
      dy.toFixed(2) +
      ')">' +
      markup +
      '</g>'
    );
  }

  function wrapSymmetric(content) {
    return (
      '<g class="amulet-symmetric">' +
      '<g class="amulet-half amulet-original">' +
      content +
      '</g>' +
      '<g class="amulet-half amulet-mirror" transform="translate(' +
      W +
      ',0) scale(-1,1)">' +
      content +
      '</g>' +
      '</g>'
    );
  }

  async function buildLayerContent(letters, style, intent) {
    const unique = [];
    for (const ch of letters) {
      if (!unique.includes(ch)) unique.push(ch);
    }
    if (!unique.length) {
      return { content: '', placements: [], anchor: null, skipped: [], style };
    }

    const LAYER2_HUB = 'א';
    let hubLetters = unique;
    let hideHubLetter = null;
    if (style.layer === 2 && !unique.includes(LAYER2_HUB)) {
      hubLetters = [LAYER2_HUB, ...unique];
      hideHubLetter = LAYER2_HUB;
    }

    let { placements, anchor, usedPairs, skipped, byLetter } = buildHubPlacements(
      hubLetters,
      intent
    );

    placements = applySpacingToPlacements(placements, anchor, style.spacing);

    byLetter = new Map(placements.map((p) => [p.letter, p]));
    const renderPlacements = hideHubLetter
      ? placements.filter((p) => p.letter !== hideHubLetter)
      : placements;
    const symbols = collectConnectionSymbols(usedPairs, intent, byLetter);

    const symbolParts = symbols.map((sym) => symbolGroupMarkup(sym, style, style.filterId));
    const glyphPathParts = [];
    for (const p of renderPlacements) {
      const glyph = await getParsedGlyph(p.letter);
      glyphPathParts.push(glyphPathsMarkup(p, glyph));
    }
    if (!symbolParts.length && !glyphPathParts.length) {
      return { content: '', placements: [], anchor: null, skipped: unique, style };
    }

    const unifiedGlyphs = buildUnifiedGlyphRendering(glyphPathParts.join(''), style, style.filterId);
    let groups = symbolParts.join('') + unifiedGlyphs;
    if (style.layer === 2) {
      groups = centerLayerGroup(groups, renderPlacements);
    }
    const content = wrapAmuletScale(wrapSymmetric(groups), style);
    return { content, placements: renderPlacements, anchor, skipped, style };
  }

  async function buildDualLayerAmulet(sentenceLetters, nameLetters) {
    readParams();
    const style3 = visualStyleLayer3(params);
    document.title =
      'v2 color:' + style3.strokeColor + ' age:' + style3.ageTexture + ' g:' + style3.gender;

    const layer3 = await buildLayerContent(sentenceLetters, style3, style3.intent);
    if (!layer3.content) {
      throw new Error('לא ניתן לצייר שכבת כוונה — בדקי חיבורים וגליפים');
    }

    let layer2 = null;
    let style2 = null;
    if (nameLetters.length) {
      style2 = visualStyleLayer2(params);
      layer2 = await buildLayerContent(nameLetters, style2, style2.intent);
      if (layer2.style) style2 = layer2.style;
    }

    const vb = viewBoxForPlacements(layer3.placements, style3.surfaceScale);
    const defs = buildSvgDefs(style2 && layer2?.content ? style2 : null, style3);

    let layers = '';
    if (layer2?.content) {
      layers +=
        '<g class="amulet-layer layer-2" data-layer="name">' + layer2.content + '</g>';
    }
    layers +=
      '<g class="amulet-layer layer-3" data-layer="intent" opacity="' +
      (style3.layerOpacity ?? 1) +
      '">' +
      layer3.content +
      '</g>';

    const svg = assembleAmuletSvg(vb, defs, layers);
    const allPlacements = layer3.placements.slice();
    if (layer2?.placements?.length) allPlacements.push(...layer2.placements);
    return {
      svg,
      layer2,
      layer3,
      style2,
      style3,
      viewBox: vb,
      placements: allPlacements,
      anchor: layer3.anchor,
      skipped: layer3.skipped
    };
  }

  function showDebug(layer2, layer3, style2, style3) {
    const el = document.getElementById('debugList');
    const blocks = [];

    if (layer2?.placements?.length && style2) {
      const rows2 = layer2.placements
        .map((p) => {
          const tag = p.letter === layer2.anchor ? ' (hub)' : '';
          return '<li>L2 ' + p.letter + tag + ': x=' + p.x.toFixed(1) + ', y=' + p.y.toFixed(1) + '</li>';
        })
        .join('');
      blocks.push(
        '<strong>שכבה 2 (שם) · chrome · ' +
          style2.occupationKey +
          ' /' +
          style2.familyStatus +
          '/' +
          style2.moodKey +
          ' | cap=' +
          style2.linecap +
          '/' +
          style2.linejoin +
          ' | spacing=' +
          style2.spacing.toFixed(2) +
          ' | color=' +
          style2.strokeColor +
          ' | scale×' +
          LAYER2_SCALE +
          '</strong><ul>' +
          rows2 +
          '</ul>'
      );
    }

    if (layer3?.placements?.length && style3) {
      const rows3 = layer3.placements
        .map((p) => {
          const tag = p.letter === layer3.anchor ? ' (hub)' : '';
          return '<li>L3 ' + p.letter + tag + ': x=' + p.x.toFixed(1) + ', y=' + p.y.toFixed(1) + '</li>';
        })
        .join('');
      blocks.push(
        '<strong>שכבה 3 (כוונה) · ' +
          style3.amuletType +
          '/' +
          style3.domainKey +
          ' age=' +
          style3.ageTexture +
          ' | cap=' +
          style3.linecap +
          '/' +
          style3.linejoin +
          ' | fx=' +
          effectLabel(style3) +
          ' spacing=' +
          style3.spacing.toFixed(2) +
          '</strong><ul>' +
          rows3 +
          '</ul>'
      );
    }

    if (!blocks.length) {
      el.hidden = true;
      return;
    }
    el.innerHTML = blocks.join('<hr style="margin:6px 0;border:none;border-top:1px dashed #ccc">');
    el.hidden = false;
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  function setResultSvg(svgString) {
    const container = document.getElementById('amuletContainer');
    const doc = new DOMParser().parseFromString(svgString, 'image/svg+xml');
    const err = doc.querySelector('parsererror');
    if (err) {
      console.error('[prototype] SVG parse error:', err.textContent);
      container.innerHTML = svgString;
      return;
    }
    container.innerHTML = svgString;
  }

  async function init() {
    requireConnectionCore();
    if (location.protocol === 'file:') {
      setStatus('פתחי דרך http://localhost:8080/prototype-v2.html (python3 server.py)');
      document.getElementById('createBtn').disabled = true;
      return;
    }
    try {
      await loadGlyphManifest();
      await loadConnections();
      appReady = true;
      setStatus('מוכן — ' + glyphLetters.length + ' גליפים, ' + connections.length + ' חיבורים');
    } catch (err) {
      appReady = false;
      setStatus('שגיאת טעינה: ' + err.message);
      document.getElementById('createBtn').disabled = true;
      console.error(err);
    }
  }

  async function composeAmulet() {
    console.log('compose called');
    if (composeBusy) return;
    if (!appReady) {
      setStatus('המערכת עדיין טוענת — המתיני רגע');
      return;
    }
    readParams();
    const sentence = document.getElementById('sentence').value.trim();
    let letters = sentence ? getFirstLetters(sentence) : [];
    if (!letters.length && lastComposeLetters.length) {
      letters = lastComposeLetters.slice();
    }
    if (!letters.length) {
      setStatus(sentence ? 'לא נמצאו אותיות עבריות במשפט' : 'כתבי משפט כוונה');
      return;
    }

    const nameLetters = lettersFromName(params.personName);

    const btn = document.getElementById('createBtn');
    composeBusy = true;
    btn.disabled = true;
    setStatus('בונה קמע (2 שכבות)…');

    try {
      const result = await buildDualLayerAmulet(letters, nameLetters);
      lastComposeLetters = letters.slice();
      const { svg, layer2, layer3, style2, style3, anchor, skipped } = result;

      console.log('[prototype-v2] compose —', {
        name: params.personName,
        nameLetters,
        sentenceLetters: letters,
        familyStatus: params.familyStatus,
        occupation: params.occupation,
        mood: params.mood,
        layer2: style2,
        layer3: style3
      });

      setResultSvg(svg);
      showDebug(layer2, layer3, style2, style3);

      let msg = 'שכבה 3: ' + letters.join(' → ') + ' | מרכז: ' + anchor;
      if (nameLetters.length) {
        msg += ' · שכבה 2 (שם): ' + nameLetters.join(' → ');
        if (layer2?.skipped?.length) msg += ' | L2 ללא חיבור: ' + layer2.skipped.join(' ');
      }
      msg += ' | ' + style3.amuletType + ' · ' + style3.domainKey;
      const bump = ageBumpByGender(style3);
      msg += ' | L3 bump×' + bump.scale + ' spacing=' + style3.spacing.toFixed(2);
      if (style2) {
        msg += ' | L2 chrome ' + style2.strokeColor;
        msg += ' ' + style2.moodKey;
        msg += ' spacing=' + style2.spacing.toFixed(2) + ' ×' + LAYER2_SCALE;
      }
      if (skipped.length) msg += ' | L3 ללא חיבור: ' + skipped.join(' ');
      setStatus(msg);
    } catch (err) {
      setStatus('שגיאה: ' + err.message);
      console.error(err);
    } finally {
      composeBusy = false;
      btn.disabled = false;
    }
  }

  document.getElementById('ageInput').addEventListener('input', () => {
    readParams();
    composeAmulet();
  });

  document.getElementById('createBtn').addEventListener('click', composeAmulet);

  init();
})();

  window.onerror = function (msg, src, line) {
    document.body.innerHTML +=
      '<p style="color:red">' + msg + ' line:' + line + '</p>';
  };
  </script>
</body>
</html>
