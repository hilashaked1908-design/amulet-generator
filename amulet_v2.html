      const align = { dx: c3.cx - c2.cx, dy: c3.cy - c2.cy };

      sketchState = {
        layers: [
          { polylines: layer2.polylines, style: layer2.style, offset: align },
          { polylines: layer3.polylines, style: layer3.style, offset: { dx: 0, dy: 0 } }
        ],
        align,
        reqLetters,
        nameLetters,
        anchor: layer3.anchor
      };
      if (p5inst) p5inst.redraw();
      return sketchState;
    }

    function drawPolyline(p, pts, strokeW, col, gloss, mirror) {
      const drawOne = (flip) => {
        p.noFill();
        p.strokeWeight(strokeW);
        p.stroke(col);
        p.beginShape();
        for (const pt of pts) {
          const x = flip ? W - pt.x : pt.x;
          p.vertex(x, pt.y);
        }
        p.endShape();
        if (gloss > 0) {
          p.strokeWeight(strokeW * 0.35);
          const c = p.color(col);
          p.stroke(p.red(c) + 40, p.green(c) + 40, p.blue(c) + 40, 180 * gloss);
          p.beginShape();
          for (const pt of pts) {
            const x = flip ? W - pt.x : pt.x;
            p.vertex(x + 1.5, pt.y - 2);
          }
          p.endShape();
        }
      };
      drawOne(false);
      if (mirror) drawOne(true);
    }

    function startSketch() {
      p5inst = new p5((p) => {
        p.setup = function () {
          const c = p.createCanvas(W, H);
          c.parent('canvasHost');
          p.noLoop();
          p.background(255);
          p.textAlign(p.CENTER, p.CENTER);
          p.fill(180);
          p.noStroke();
          p.textSize(14);
          p.text('לחצי «צור קמע»', W / 2, H / 2);
        };

        p.draw = function () {
          p.background(255);
          if (!sketchState.layers.length) return;
          for (const layer of sketchState.layers) {
            if (!layer.polylines.length || !layer.style) continue;
            const ox = layer.offset.dx || 0;
            const oy = layer.offset.dy || 0;
            const scale = layer.style.scale || 1;
            for (const pl of layer.polylines) {
              const shifted = pl.pts.map((pt) => {
                let x = (pt.x - CX) * scale + CX + ox;
                let y = (pt.y - CY) * scale + CY + oy;
                return { x, y };
              });
              drawPolyline(p, shifted, layer.style.strokeW, layer.style.color, layer.style.gloss, true);
            }
          }
        };
      });
    }

    $('createBtn').addEventListener('click', () => {
      try {
        const params = parseHebrewText($('freeText').value);
        $('paramsPreview').hidden = false;
        $('paramsPreview').textContent = JSON.stringify(params, null, 2);
        setStatus('בונה קמע…');
        const state = composeAmulet(params);
        let msg = 'שכבה 3: ' + state.reqLetters.join(' → ') + ' | מרכז: ' + state.anchor;
        if (state.nameLetters.length) msg += ' · שכבה 2: ' + state.nameLetters.join(' → ');
        msg += ' | יישור: ' + state.align.dx.toFixed(1) + ',' + state.align.dy.toFixed(1);
        setStatus(msg);
      } catch (err) {
        setStatus('שגיאה: ' + err.message);
        console.error(err);
      }
    });

    if (typeof p5 === 'undefined') {
      setStatus('p5.js לא נטען — בדקי חיבור לאינטרנט');
    } else {
      startSketch();
      setStatus('מוכן — p5.js');
    }
  })();
  </script>
</body>
</html>
